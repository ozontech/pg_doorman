# pg_doorman fields.yaml — single source of truth for all field descriptions.
#
# Structure:
#   sections:  Section separator titles (EN/RU)
#   texts:     Common texts (warnings, headers) with `config` and/or `doc` variants
#   fields:    Per-field descriptions with `config` (short, for config comments) and `doc` (rich, for reference docs)
#
# Each field has:
#   config: { en, ru }    — short inline comments for generated configs
#   doc:    string         — rich descriptions for reference documentation
#   default: (optional)   — default value string for display

sections:
  network:
    en: "Network Settings"
    ru: "Сетевые настройки"
  timeouts:
    en: "Connection Timeouts"
    ru: "Таймауты подключений"
  tcp:
    en: "TCP Settings"
    ru: "Настройки TCP"
  limits:
    en: "Connection Limits"
    ru: "Лимиты подключений"
  logging:
    en: "Logging"
    ru: "Логирование"
  workers:
    en: "Worker Settings"
    ru: "Настройки воркеров"
  pool_behavior:
    en: "Pool Behavior"
    ru: "Поведение пула"
  prepared:
    en: "Prepared Statements"
    ru: "Подготовленные запросы (Prepared Statements)"
  admin:
    en: "Admin Console"
    ru: "Консоль администратора"
  tls_client:
    en: "TLS Settings (Client-facing)"
    ru: "Настройки TLS (для клиентов)"
  tls_server:
    en: "TLS Settings (Server-facing)"
    ru: "Настройки TLS (для серверов PostgreSQL)"
  daemon:
    en: "Daemon Mode"
    ru: "Режим демона"
  hba_legacy:
    en: "Access Control (Legacy)"
    ru: "Контроль доступа (устаревший способ)"
  hba:
    en: "Access Control (pg_hba - Recommended)"
    ru: "Контроль доступа (pg_hba — рекомендуется)"
  pool_server:
    en: "Server Connection Settings"
    ru: "Настройки подключения к серверу"
  pool_settings:
    en: "Pool Settings"
    ru: "Настройки пула"
  pool_app:
    en: "Application Settings"
    ru: "Настройки приложения"
  pool_users_toml:
    en: "Users Configuration (TOML uses indexed format)"
    ru: "Настройки пользователей (в TOML используется индексный формат)"
  pool_users_yaml:
    en: "Users Configuration"
    ru: "Настройки пользователей"
  auth_query:
    en: "Dynamic Authentication (auth_query)"
    ru: "Динамическая аутентификация (auth_query)"
  scaling:
    en: "Connection Scaling"
    ru: "Масштабирование соединений"
  pool_scaling:
    en: "Connection Scaling Overrides"
    ru: "Переопределение масштабирования соединений"
  pool_coordinator:
    en: "Pool Coordinator (database-level connection limit)"
    ru: "Координатор пула (лимит соединений на уровне БД)"
  pool_examples:
    en: "Additional Pool Examples"
    ru: "Дополнительные примеры пулов"

texts:
  header_warning:
    en: "IMPORTANT: Use ONLY ONE configuration file format (YAML or TOML), not both."
    ru: "ВАЖНО: Используйте ТОЛЬКО ОДИН формат конфигурации (YAML или TOML), не оба."
  header_yaml_recommended:
    en: "YAML format (.yaml, .yml) is recommended for new configurations."
    ru: "Формат YAML (.yaml, .yml) рекомендуется для новых конфигураций."
  header_toml_compat:
    en: "TOML format (.toml) is supported for backward compatibility."
    ru: "Формат TOML (.toml) поддерживается для обратной совместимости."
  header_auto_detect:
    en: "The format is automatically detected based on the file extension."
    ru: "Формат определяется автоматически по расширению файла."
  human_readable_title:
    en: "HUMAN-READABLE VALUES"
    ru: "ЧЕЛОВЕКОЧИТАЕМЫЕ ЗНАЧЕНИЯ"
  human_readable_desc:
    en: "pg_doorman supports human-readable formats for duration and byte size values."
    ru: "pg_doorman поддерживает человекочитаемые форматы для значений времени и размера."
  human_readable_compat:
    en: "Both numeric values (for backward compatibility) and string formats are supported."
    ru: "Поддерживаются как числовые значения (для совместимости), так и строковые форматы."
  duration_title:
    en: "Duration formats:"
    ru: "Форматы времени:"
  duration_plain:
    en: "  - Plain numbers: interpreted as milliseconds (e.g., 5000 = 5 seconds)"
    ru: "  - Числа: интерпретируются как миллисекунды (напр., 5000 = 5 секунд)"
  duration_s:
    en: "  - \"Ns\"  : seconds (e.g., \"5s\" = 5000 milliseconds)"
    ru: "  - \"Ns\"  : секунды (напр., \"5s\" = 5000 миллисекунд)"
  duration_m:
    en: "  - \"Nm\"  : minutes (e.g., \"5m\" = 300000 milliseconds)"
    ru: "  - \"Nm\"  : минуты (напр., \"5m\" = 300000 миллисекунд)"
  duration_h:
    en: "  - \"Nh\"  : hours (e.g., \"1h\" = 3600000 milliseconds)"
    ru: "  - \"Nh\"  : часы (напр., \"1h\" = 3600000 миллисекунд)"
  duration_d:
    en: "  - \"Nd\"  : days (e.g., \"1d\" = 86400000 milliseconds)"
    ru: "  - \"Nd\"  : дни (напр., \"1d\" = 86400000 миллисекунд)"
  byte_size_title:
    en: "Byte size formats:"
    ru: "Форматы размера:"
  byte_size_plain:
    en: "  - Plain numbers: interpreted as bytes (e.g., 1048576 = 1 MB)"
    ru: "  - Числа: интерпретируются как байты (напр., 1048576 = 1 МБ)"
  example_title:
    en: "Examples:"
    ru: "Примеры:"
  example_connect_timeout:
    en: "  connect_timeout: \"3s\"        # instead of 3000"
    ru: "  connect_timeout: \"3s\"        # вместо 3000"
  example_idle_timeout:
    en: "  idle_timeout: \"10m\"          # instead of 600000"
    ru: "  idle_timeout: \"10m\"          # вместо 600000"
  example_max_memory:
    en: "  max_memory_usage: \"256MB\"    # instead of 268435456"
    ru: "  max_memory_usage: \"256MB\"    # вместо 268435456"
  include_desc:
    en: "Include additional configuration files."
    ru: "Подключение дополнительных файлов конфигурации."
  include_merge:
    en: "Files are merged in order, allowing modular configuration."
    ru: "Файлы объединяются по порядку, что позволяет собирать конфиг из частей."
  general_title:
    en: "GENERAL SETTINGS"
    ru: "ОСНОВНЫЕ НАСТРОЙКИ"
  prometheus_title:
    en: "PROMETHEUS METRICS"
    ru: "МЕТРИКИ PROMETHEUS"
  talos_title:
    en: "TALOS AUTHENTICATION (Optional)"
    ru: "АУТЕНТИФИКАЦИЯ TALOS (Опционально)"
  talos_desc:
    en: "Talos is an optional authentication mechanism using public key cryptography."
    ru: "Talos — опциональный механизм аутентификации на основе криптографии с открытым ключом."
  talos_keys:
    en: "List of public key files for Talos authentication."
    ru: "Список файлов публичных ключей для аутентификации Talos."
  talos_databases:
    en: "List of databases that use Talos authentication."
    ru: "Список баз данных, использующих аутентификацию Talos."
  pools_title:
    en: "CONNECTION POOLS"
    ru: "ПУЛЫ ПОДКЛЮЧЕНИЙ"
  pools_desc:
    en: "Each pool represents a virtual database that clients can connect to."
    ru: "Каждый пул представляет виртуальную базу данных, к которой подключаются клиенты."
  pools_names:
    en: "Pool names are visible to clients as database names."
    ru: "Имена пулов видны клиентам как имена баз данных."
  pool_example_title:
    en: "Example pool configuration"
    ru: "Пример конфигурации пула"
  pool_users_toml_indexed:
    en: "Users are defined with numeric indices: [pools.{pool}.users.0], [pools.{pool}.users.1], etc."
    ru: "Пользователи задаются с числовыми индексами: [pools.{pool}.users.0], [pools.{pool}.users.1] и т.д."
  pool_users_unique:
    en: "Each user must have a unique username within the pool."
    ru: "Каждый пользователь должен иметь уникальный username в рамках пула."
  pool_users_yaml_array:
    en: "Array of users allowed to connect to this pool."
    ru: "Массив пользователей, которым разрешено подключаться к этому пулу."
  pg_hba_desc:
    en: "PostgreSQL-style pg_hba.conf rules for client authentication."
    ru: "Правила аутентификации клиентов в стиле pg_hba.conf PostgreSQL."
  pg_hba_formats:
    en: "Supports three formats:"
    ru: "Поддерживает три формата:"
  pg_hba_rule_format:
    en: "Rule format: TYPE DATABASE USER ADDRESS METHOD"
    ru: "Формат правил: ТИП БАЗА ПОЛЬЗОВАТЕЛЬ АДРЕС МЕТОД"
  pg_hba_types:
    en: "Types: local, host, hostssl, hostnossl"
    ru: "Типы: local, host, hostssl, hostnossl"
  pg_hba_methods:
    en: "Methods: trust, md5, scram-sha-256, reject"
    ru: "Методы: trust, md5, scram-sha-256, reject"
  pg_hba_trust_1:
    en: "Trust behavior: when a matching rule uses 'trust', pg_doorman accepts"
    ru: "Поведение trust: если подходящее правило использует 'trust', pg_doorman принимает"
  pg_hba_trust_2:
    en: "the connection without asking for a password, even if the user has"
    ru: "подключение без запроса пароля, даже если у пользователя настроен"
  pg_hba_trust_3:
    en: "an MD5 or SCRAM password configured."
    ru: "пароль MD5 или SCRAM."
  pg_hba_example_title:
    en: "Example pg_hba rules:"
    ru: "Пример правил pg_hba:"
  pool_example_multi:
    en: "Example: Pool with multiple users"
    ru: "Пример: Пул с несколькими пользователями"
  pool_example_unix:
    en: "Example: Pool with unix socket connection"
    ru: "Пример: Пул с подключением через unix socket"
  pool_example_jwt:
    en: "Example: Pool with JWT authentication"
    ru: "Пример: Пул с JWT-аутентификацией"
  auth_query_desc:
    en: |
      Dynamic user authentication via PostgreSQL queries.
      Instead of listing users statically, pg_doorman fetches credentials from
      a PostgreSQL database at connection time.
    ru: |
      Динамическая аутентификация пользователей через запросы к PostgreSQL.
      Вместо статического перечисления пользователей pg_doorman получает учётные
      данные из базы PostgreSQL при подключении.
  auth_query_modes:
    en: |
      Two modes are available:
      - Dedicated mode (server_user is set): all dynamic users share one pool
      - Passthrough mode (server_user is not set): each user gets their own pool
    ru: |
      Доступны два режима:
      - Dedicated mode (server_user задан): все динамические пользователи используют один пул
      - Passthrough mode (server_user не задан): каждый пользователь получает свой пул
  auth_query_priority:
    en: "Static users (defined in 'users') are checked first; auth_query is only used when the username is not found among static users."
    ru: "Статические пользователи (из секции 'users') проверяются первыми; auth_query используется только если имя пользователя не найдено среди статических."
  auth_query_security:
    en: "WARNING: Do not use a superuser for auth queries. Create a SECURITY DEFINER function and a dedicated role (see reference docs)."
    ru: "ВНИМАНИЕ: Не используйте суперпользователя для auth queries. Создайте SECURITY DEFINER функцию и отдельную роль (см. справочную документацию)."
  auth_query_example_dedicated:
    en: "Dedicated mode example (simplest — all dynamic users share one backend connection pool):"
    ru: "Пример dedicated mode (простейший — все динамические пользователи используют один серверный пул):"
  auth_query_example_passthrough:
    en: "Passthrough mode example (each dynamic user gets their own backend connection pool):"
    ru: "Пример passthrough mode (каждый динамический пользователь получает свой серверный пул):"
  pool_example_mapped:
    en: "Example: Pool with server-side credentials mapping"
    ru: "Пример: Пул с маппингом серверных учётных данных"

fields:
  general:
    host:
      config:
        en: "Listen host for incoming connections (IPv4 only)."
        ru: "Адрес для приёма входящих подключений (только IPv4)."
      doc: "Listen host (TCP v4 only)."
      default: '"0.0.0.0"'

    port:
      config:
        en: "Listen port for incoming connections."
        ru: "Порт для приёма входящих подключений."
      doc: "Listen port for incoming connections."
      default: "5432"

    backlog:
      config:
        en: |
          TCP backlog for incoming connections.
          A value of zero sets max_connections as the TCP backlog value.
        ru: |
          TCP backlog для входящих подключений.
          Значение 0 использует max_connections как значение TCP backlog.
      doc: "TCP backlog for incoming connections. A value of zero sets the `max_connections` as value for the TCP backlog."
      default: "0"

    connect_timeout:
      config:
        en: "Timeout for establishing a new connection to PostgreSQL. Similar to PgBouncer's server_connect_timeout."
        ru: "Таймаут установки нового соединения с PostgreSQL. Аналог server_connect_timeout в PgBouncer."
      doc: "Maximum time to wait when establishing a new connection to a PostgreSQL server. If the connection cannot be established within this period, the attempt is aborted. Similar to PgBouncer's `server_connect_timeout`."
      default: "3000 (3 sec)"

    query_wait_timeout:
      config:
        en: |
          How long a client waits for a server connection before getting an error.
          Applies when all connections in the pool are busy.
          Similar to PgBouncer's query_wait_timeout.
        ru: |
          Как долго клиент ждёт серверное соединение, прежде чем получит ошибку.
          Срабатывает, когда все соединения в пуле заняты.
          Аналог query_wait_timeout в PgBouncer.
      doc: "Maximum time a client query can wait for a server connection when the pool is fully utilized. If no server connection becomes available within this period, the client receives an error. Similar to PgBouncer's `query_wait_timeout`."
      default: "5000 (5 sec)"

    idle_timeout:
      config:
        en: |
          Close a server connection that has been idle longer than this.
          Only applies to connections that served at least one client request.
          Prewarmed connections that were never used are not affected (use server_lifetime for those).
          Set to 0 to disable. Similar to PgBouncer's server_idle_timeout.
        ru: |
          Закрывать серверное соединение, простаивающее дольше этого значения.
          Действует только на соединения, обслужившие хотя бы один запрос.
          Prewarm-соединения, которые ни разу не использовались, не затрагиваются (для них — server_lifetime).
          0 — отключено. Аналог server_idle_timeout в PgBouncer.
      doc: |
        Close a server connection that has been idle (not checked out by any client) longer than this value.
        Only applies to connections that have served at least one client request. Prewarmed or replenished
        connections that were never checked out are not subject to `idle_timeout` — they are only closed
        when `server_lifetime` expires. Each connection gets ±20% jitter to prevent synchronized mass closures.
        Set to `0` to disable. Similar to PgBouncer's `server_idle_timeout`.
      default: "600000 (10 min)"

    server_lifetime:
      config:
        en: |
          Maximum age of a server connection. Closed when idle, not mid-transaction.
          Applies to all connections including prewarmed ones that were never used.
          Set to 0 to disable. Similar to PgBouncer's server_lifetime.
        ru: |
          Максимальный возраст серверного соединения. Закрывается в момент простоя, не посреди транзакции.
          Действует на все соединения, включая prewarm-соединения, которые ни разу не использовались.
          0 — отключено. Аналог server_lifetime в PgBouncer.
      doc: |
        Maximum age of a server connection. When a connection exceeds this age and becomes idle,
        it is closed during the next retain cycle. Active transactions are not interrupted.
        Applies to all connections, including prewarmed ones that were never checked out by a client.
        Each connection gets ±20% jitter to prevent thundering herd. Set to `0` to disable.
        Similar to PgBouncer's `server_lifetime`.
      default: "1200000 (20 min)"

    retain_connections_time:
      config:
        en: "Interval for checking and closing idle connections."
        ru: "Интервал проверки и закрытия простаивающих соединений."
      doc: |
        Interval for checking and closing idle connections that exceed `idle_timeout` or `server_lifetime`.
        The retain task runs periodically at this interval to clean up expired connections.
      default: "30000 (30 sec)"

    retain_connections_max:
      config:
        en: |
          Maximum number of idle connections to close per retain cycle.
          0 means unlimited (close all idle connections that exceed timeout).
        ru: |
          Максимальное количество простаивающих соединений, закрываемых за один цикл.
          0 — без ограничений (закрывать все соединения, превысившие таймаут).
      doc: |
        Maximum number of idle connections to close per retain cycle.
        When set to `0`, all idle connections that exceed `idle_timeout` or `server_lifetime` will be closed immediately.
        When set to a positive value, at most that many connections will be closed per cycle across all pools.

        This parameter controls how aggressively pg_doorman closes idle connections. With the default value of `3`,
        up to 3 connections are closed per retain cycle, providing controlled cleanup. If you need faster cleanup of
        expired connections, set to `0` (unlimited) to close all expired connections in each retain cycle.
      default: "3"

    server_idle_check_timeout:
      config:
        en: |
          Time after which an idle server connection should be checked before being
          given to a client. This helps detect dead connections caused by PostgreSQL
          restart, network issues, or server-side idle timeouts.
          0 means disabled (no check).
        ru: |
          Время простоя серверного соединения, после которого оно проверяется перед
          передачей клиенту. Помогает обнаружить мёртвые соединения из-за перезапуска
          PostgreSQL, сетевых проблем или серверных таймаутов.
          0 — проверка отключена.
      doc: |
        Time after which an idle server connection should be checked before being given to a client.
        This helps detect dead connections caused by PostgreSQL restart, network issues, or server-side idle timeouts.

        When a connection has been idle in the pool longer than this timeout, pg_doorman will send a minimal query (`;`)
        to verify the connection is still alive before returning it to the client. If the check fails, the connection
        is discarded and a new one is obtained.

        Set to `0` to disable the check (not recommended for production environments with potential network instability
        or PostgreSQL restarts).
      default: "60s (60 seconds)"

    shutdown_timeout:
      config:
        en: "Time to wait for active transactions to finish during graceful shutdown."
        ru: "Время ожидания завершения активных транзакций при корректном завершении работы."
      doc: "During graceful shutdown (SIGTERM), pg_doorman waits up to this long for in-flight transactions to complete before forcibly closing connections."
      default: "10000 (10 sec)"

    proxy_copy_data_timeout:
      config:
        en: "Timeout for COPY data operations."
        ru: "Таймаут операций COPY."
      doc: "Maximum time to wait for data copy operations during proxying, in milliseconds."
      default: "15000 (15 sec)"

    tcp_keepalives_idle:
      config:
        en: |
          TCP keepalive settings (in seconds).
          Keepalive is enabled by default and overwrites OS defaults.
        ru: |
          Настройки TCP keepalive (в секундах).
          Keepalive включён по умолчанию и перезаписывает настройки ОС.
      doc: "Keepalive enabled by default and overwrite OS defaults."
      default: "5"

    tcp_keepalives_interval:
      config:
        en: "Interval between TCP keepalive probes (seconds)."
        ru: "Интервал между TCP keepalive пробами (секунды)."
      doc: "Interval in seconds between individual TCP keepalive probes after the initial idle period (`tcp_keepalives_idle`) has passed."
      default: "5"

    tcp_keepalives_count:
      config:
        en: "Number of failed TCP keepalive probes before closing the connection."
        ru: "Количество неудачных TCP keepalive проб перед закрытием соединения."
      doc: "Number of unacknowledged TCP keepalive probes before the connection is considered dead and closed."
      default: "5"

    tcp_so_linger:
      config:
        en: |
          TCP SO_LINGER setting.
          By default, pg_doorman sends RST instead of keeping the connection open.
        ru: |
          Настройка TCP SO_LINGER.
          По умолчанию pg_doorman отправляет RST вместо удержания соединения.
      doc: "By default, pg_doorman send `RST` instead of keeping the connection open for a long time."
      default: "0"

    tcp_no_delay:
      config:
        en: "Enable TCP_NODELAY to disable Nagle's algorithm for lower latency."
        ru: "Включить TCP_NODELAY для отключения алгоритма Нагла (меньше задержка)."
      doc: "TCP_NODELAY to disable Nagle's algorithm for lower latency."
      default: "true"

    tcp_user_timeout:
      config:
        en: |
          TCP_USER_TIMEOUT for client connections (in seconds).
          Helps detect dead connections faster when data remains unacknowledged.
          Only supported on Linux. Set to 0 to disable.
        ru: |
          TCP_USER_TIMEOUT для клиентских соединений (в секундах).
          Помогает быстрее обнаружить мёртвые соединения при неподтверждённых данных.
          Поддерживается только на Linux. 0 — отключено.
      doc: |
        Sets the `TCP_USER_TIMEOUT` socket option for client connections (in seconds). This option specifies
        the maximum time that transmitted data may remain unacknowledged before TCP will forcibly close the
        connection. This helps detect dead client connections faster than keepalive probes when the connection
        is actively sending data but the remote end has become unreachable (e.g., network failure, client crash).

        When set to a non-zero value, if data remains unacknowledged for this duration, the connection will
        be terminated. This is particularly useful to avoid 15-16 minute delays caused by TCP retransmission
        timeout when keepalive cannot help (e.g., during active data transmission).

        **Note:** This option is only supported on Linux. On other operating systems, this setting is ignored.

        Set to `0` to disable (use OS default).
      default: "60"

    unix_socket_buffer_size:
      config:
        en: "Buffer size for read/write operations when connecting via unix socket."
        ru: "Размер буфера для чтения/записи при подключении через unix socket."
      doc: "Buffer size for read and write operations when connecting to PostgreSQL via a unix socket."
      default: "1048576"

    unix_socket_dir:
      config:
        en: "Directory for Unix socket listener. Creates .s.PGSQL.<port> file. Use psql -h <dir> or pgbench -h <dir> to connect."
        ru: "Директория для Unix socket. Создаёт файл .s.PGSQL.<port>. Подключение: psql -h <dir> или pgbench -h <dir>."
      doc: "Directory for Unix domain socket listener. Creates .s.PGSQL.<port> socket file for local client connections."
      default: "null"

    unix_socket_mode:
      config:
        en: |
          Permission mode applied to the .s.PGSQL.<port> socket file after bind.
          Octal string. Only the lowest 9 bits (0o777) are honored.
        ru: |
          Права доступа на файл .s.PGSQL.<port>, выставляемые сразу после bind.
          Восьмеричная строка. Учитываются только младшие 9 бит (0o777).
      doc: |
        Permission mode applied to the Unix domain socket file `.s.PGSQL.<port>` immediately after `bind()`. Specified as an octal string (e.g. `"0600"`, `"0660"`, `"0666"`). Only the lowest 9 bits are honored — setuid/setgid/sticky bits are rejected.

        The default `"0600"` restricts socket access to the user running pg_doorman. To let other local users connect, set a more permissive mode such as `"0660"` (group access) or `"0666"` (any local user). When loosening the mode, ensure the parent directory permissions allow traversal by the intended group.
      default: "\"0600\""

    max_connections:
      config:
        en: |
          Maximum number of clients that can connect simultaneously.
          When reached, clients receive error code 53300: "sorry, too many clients already"
        ru: |
          Максимальное количество одновременных клиентских подключений.
          При превышении клиент получит ошибку 53300: "sorry, too many clients already"
      doc: |
        The maximum number of clients that can connect to the pooler simultaneously. When this limit is reached:

        * A client connecting without SSL will receive the expected error (code: `53300`, message: `sorry, too many clients already`).
        * A client connecting via SSL will see a message indicating that the server does not support the SSL protocol.
      default: "8192"

    max_concurrent_creates:
      config:
        en: |
          Maximum number of server connections that can be created concurrently.
          Uses a semaphore to limit parallel connection creation.
        ru: |
          Максимальное количество серверных соединений, создаваемых одновременно.
          Использует семафор для ограничения параллельного создания соединений.
      doc: |
        Maximum number of server connections that can be created concurrently per pool. This setting uses a semaphore to limit parallel connection creation, which significantly improves performance during cold start and burst scenarios.

        Higher values allow faster pool warm-up but may increase load on the PostgreSQL server during connection storms. Lower values provide more gradual connection creation.
      default: "4"

    scaling_warm_pool_ratio:
      config:
        en: |
          Warm pool ratio (0-100, percentage).
          Connections below this threshold of max_size are created immediately.
          Above this threshold, anticipation wait + bounded burst is applied.
        ru: |
          Коэффициент прогрева пула (0-100, в процентах).
          Соединения ниже этого порога от max_size создаются немедленно.
          Выше порога применяются ожидание возврата соединения и ограничение параллельных create.
      doc: |
        Warm pool ratio as a percentage (0-100). When the pool size is below this threshold
        of `max_size`, new connections are created immediately. Above this threshold, the
        pool first spins via fast retries, then enters an event-driven anticipation loop
        that waits for a returned idle connection. The loop is bounded by the client's
        remaining `query_wait_timeout` minus a 500 ms reserve for the create path, so it
        cannot push the caller past its own wait deadline.
      default: "20"

    scaling_fast_retries:
      config:
        en: |
          Number of fast retries with yield_now() before the anticipation wait.
          Higher values reduce latency on micro-races but increase CPU usage.
        ru: |
          Количество быстрых повторов с yield_now() перед ожиданием возврата соединения.
          Большие значения снижают задержку на микрогонках, но увеличивают нагрузку на CPU.
      doc: |
        Number of fast retries using `yield_now()` for low-latency waiting when checking out
        connections above the warm pool threshold. Each retry takes approximately 1-5μs.
        After exhausting fast retries, the pool enters an event-driven anticipation loop
        bounded by the client's remaining `query_wait_timeout`.
      default: "10"

    scaling_max_parallel_creates:
      config:
        en: |
          Hard cap on concurrent server connection creates per pool.
          Anti-thundering-herd: tasks above this limit wait on a Notify
          for either an idle return or a create completion. Must be >= 1.
        ru: |
          Жёсткий лимит одновременных созданий серверных соединений в одном пуле.
          Анти-thundering-herd: задачи сверх лимита ожидают на Notify
          либо возврата соединения, либо завершения параллельного create. Должно быть >= 1.
      doc: |
        Bounded burst limiter for connection creation. Without this cap, N parallel
        `timeout_get` callers that miss the idle pool each independently issue a backend
        connect, producing thundering-herd bursts under load. With the cap, only this
        many creates run concurrently per pool; the rest wait briefly on a Notify and
        then either pick up a freshly returned idle connection or take the next create
        slot. Default `2` is a compromise between throughput and burst smoothing.
      default: "2"

    max_memory_usage:
      config:
        en: |
          Memory limit for in-flight query buffers across all connections.
          When exceeded, new queries are rejected with an error until memory drops below the limit.
        ru: |
          Лимит памяти для буферов активных запросов по всем соединениям.
          При превышении новые запросы отклоняются с ошибкой, пока память не снизится.
      doc: |
        Total memory budget for internal buffers holding in-flight query data across all client connections.
        When this limit is reached, pg_doorman rejects new queries with an error until existing queries complete
        and free their buffers. Protects the pooler process from OOM under heavy load or large result sets.
      default: "268435456 (256 MB)"

    log_client_connections:
      config:
        en: "Log client connections for monitoring."
        ru: "Логировать подключения клиентов."
      doc: "Log client connections for monitoring."
      default: "true"

    log_client_disconnections:
      config:
        en: "Log client disconnections for monitoring."
        ru: "Логировать отключения клиентов."
      doc: "Log client disconnections for monitoring."
      default: "true"

    syslog_prog_name:
      config:
        en: |
          Syslog program name. When specified, pg_doorman sends messages to syslog.
          Comment out to log to stdout.
        ru: |
          Имя программы для syslog. Если указано, pg_doorman отправляет логи в syslog.
          Закомментируйте для вывода логов в stdout.
      doc: |
        When specified, pg_doorman starts sending messages to syslog (using /dev/log or /var/run/syslog).
        Comment this out if you want to log to stdout.
      default: "None"

    worker_threads:
      config:
        en: |
          Tokio worker threads for handling client connections.
          Set to CPU core count for best throughput. Exceeding core count gives no benefit.
        ru: |
          Tokio worker-потоки для обслуживания клиентских соединений.
          Для лучшей пропускной способности установите равным числу CPU-ядер. Больше ядер — бессмысленно.
      doc: |
        Number of Tokio runtime worker threads (OS threads) for serving client connections.
        Performance scales linearly up to the number of CPU cores.
        Also determines the shard count for internal concurrent hash maps (`worker_threads * 4`, rounded to nearest power of 2, minimum 4).
        In Kubernetes, set this explicitly — automatic CPU detection may report the host's cores instead of the container's limit.
      default: "4"

    worker_cpu_affinity_pinning:
      config:
        en: "Bind each worker thread to a separate CPU core. By default, worker threads are not bound to any specific CPU."
        ru: "Привязать каждый worker thread к отдельному ядру CPU. По умолчанию потоки не привязаны к конкретным ядрам."
      doc: "Bind each worker thread to a separate CPU core (sched_setaffinity). Disabled when fewer than 3 cores are available."
      default: "false"

    tokio_settings_note:
      config:
        en: |
          Tokio runtime settings (advanced, change only if you understand the implications).
          Modern tokio versions handle these well by default, so these parameters are optional.
          Uncomment only if you need to override tokio's defaults.
        ru: |
          Настройки Tokio runtime (продвинутые, меняйте только если понимаете последствия).
          Современные версии tokio хорошо справляются по умолчанию, поэтому параметры опциональны.
          Раскомментируйте, только если нужно переопределить значения по умолчанию.

    worker_stack_size:
      config:
        en: "Stack size for each worker thread."
        ru: "Размер стека каждого рабочего потока."
      doc: |
        [Tokio runtime settings](https://docs.rs/tokio/latest/tokio/runtime/struct.Builder.html#method.thread_stack_size).
        Sets the stack size for worker threads.
        Modern tokio versions handle this well by default, so this parameter is optional.
      default: "not set (uses tokio's default)"

    max_blocking_threads:
      config:
        en: "Maximum number of threads for blocking operations."
        ru: "Максимальное количество потоков для блокирующих операций."
      doc: |
        [Tokio runtime settings](https://docs.rs/tokio/latest/tokio/runtime/struct.Builder.html#method.max_blocking_threads).
        Sets the maximum number of threads for blocking operations.
        Modern tokio versions handle this well by default, so this parameter is optional.
      default: "not set (uses tokio's default)"

    tokio_global_queue_interval:
      config:
        en: "Controls how often the scheduler checks the global task queue."
        ru: "Как часто планировщик проверяет глобальную очередь задач."
      doc: |
        [Tokio runtime settings](https://docs.rs/tokio/latest/tokio/runtime/struct.Builder.html#method.global_queue_interval).
        Controls how often the scheduler checks the global task queue.
        Modern tokio versions handle this well by default, so this parameter is optional.
      default: "not set (uses tokio's default)"

    tokio_event_interval:
      config:
        en: "Controls how often the scheduler checks for external events (I/O, timers)."
        ru: "Как часто планировщик проверяет внешние события (I/O, таймеры)."
      doc: |
        [Tokio runtime settings](https://docs.rs/tokio/latest/tokio/runtime/struct.Builder.html#method.event_interval).
        Controls how often the scheduler checks for external events (I/O, timers).
        Modern tokio versions handle this well by default, so this parameter is optional.
      default: "not set (uses tokio's default)"

    server_round_robin:
      config:
        en: |
          Server selection strategy in transaction mode.
          false = LRU (reuse most recent connection) — better cache locality
          true  = Round Robin (rotate across connections) — more even load
        ru: |
          Стратегия выбора серверного соединения в транзакционном режиме.
          false = LRU (повторное использование последнего) — лучше кеш-локальность
          true  = Round Robin (ротация по соединениям) — равномернее нагрузка
      doc: |
        Controls which idle server connection is picked for the next transaction.
        `false` (LRU): reuses the most recently returned connection. Keeps fewer connections hot, better for PostgreSQL shared buffer locality.
        `true` (Round Robin): rotates across all idle connections evenly.
        Similar to PgBouncer's `server_round_robin`.
      default: "false"

    sync_server_parameters:
      config:
        en: |
          Track and replay a subset of session parameters on each new backend in transaction mode.
          Tracked parameters: client_encoding, DateStyle, TimeZone, standard_conforming_strings, application_name.
          Adds a SET roundtrip per checkout. Disabled by default.
          If you only need application_name, use the pool-level application_name setting instead.
        ru: |
          Отслеживать и воспроизводить подмножество параметров сессии на каждом новом бэкенде в транзакционном режиме.
          Отслеживаемые параметры: client_encoding, DateStyle, TimeZone, standard_conforming_strings, application_name.
          Добавляет SET-запрос при каждом checkout. Отключено по умолчанию.
          Если нужен только application_name, используйте настройку application_name на уровне пула.
      doc: |
        In transaction mode, each transaction may land on a different backend. With `sync_server_parameters = true`,
        pg_doorman tracks changes to a fixed set of session parameters and replays them via SET on each new backend
        before executing the transaction. Tracked parameters: `client_encoding`, `DateStyle`, `TimeZone`,
        `standard_conforming_strings`, `application_name`. Other SET commands (e.g., `statement_timeout`, `work_mem`)
        are NOT tracked. This costs one extra roundtrip per checkout. If you only need `application_name` visibility
        in `pg_stat_activity`, use the pool-level `application_name` setting instead.
      default: "false"

    message_size_to_be_stream:
      config:
        en: |
          DataRow messages larger than this threshold are streamed to the client in small chunks
          instead of being buffered entirely in memory. Prevents memory spikes on large rows.
        ru: |
          DataRow-сообщения, превышающие этот порог, передаются клиенту потоково малыми частями
          вместо полной буферизации в памяти. Предотвращает пики памяти на больших строках.
      doc: |
        When a PostgreSQL DataRow message exceeds this threshold, pg_doorman switches to streaming mode:
        data is forwarded to the client in 4 KB chunks instead of buffering the entire message.
        This prevents OOM on queries that return very large rows (e.g., tables with big `bytea`/`text` columns).
        The threshold itself defaults to 1 MB.
      default: "1048576 (1 MB)"

    pooler_check_query:
      config:
        en: |
          Query intercepted by pg_doorman and answered locally (never reaches PostgreSQL).
          Used by load balancers and monitoring to check if the pooler is alive.
        ru: |
          Запрос, перехватываемый pg_doorman и отвечаемый локально (не доходит до PostgreSQL).
          Используется балансировщиками и мониторингом для проверки живости пулера.
      doc: |
        When a client sends this exact query as a SimpleQuery, pg_doorman responds immediately
        without forwarding it to PostgreSQL. Useful for health checks from load balancers (HAProxy, pgbouncer-style `SELECT 1`)
        or application-level keepalive probes. The default `;` (empty statement) is the lightest possible check.
      default: '";"'

    prepared_statements:
      config:
        en: "Enable caching of prepared statements."
        ru: "Включить кеширование подготовленных запросов."
      doc: "Switcher to enable/disable caching of prepared statements."
      default: "true"

    prepared_statements_cache_size:
      config:
        en: "Cache size for prepared statements at the pool level (shared across clients)."
        ru: "Размер кеша подготовленных запросов на уровне пула (общий для всех клиентов)."
      doc: |
        Cache size of prepared statements at the pool level (shared across all clients connecting to the same pool).
        This cache stores the mapping from query hash to rewritten prepared statement name.
      default: "8192"

    client_prepared_statements_cache_size:
      config:
        en: |
          Maximum prepared statements cached per client connection.
          Protection against malicious clients that don't call DEALLOCATE.
          Set to 0 for unlimited (relies on client calling DEALLOCATE).
        ru: |
          Максимум подготовленных запросов в кеше для одного клиентского соединения.
          Защита от вредоносных клиентов, которые не вызывают DEALLOCATE.
          0 — без ограничений (полагается на вызов DEALLOCATE клиентом).
      doc: |
        Maximum number of prepared statements cached per client connection. This is a protection mechanism against
        malicious or misbehaving clients that don't call `DEALLOCATE` and could cause memory exhaustion by creating
        unlimited prepared statements over long-running connections.

        When the limit is reached, the oldest entry is evicted from the client's cache. The evicted statement
        can still be re-used later because the pool-level cache (`prepared_statements_cache_size`) retains the
        query-to-server-name mapping.

        Set to `0` to disable the limit (unlimited cache size, relies on client calling `DEALLOCATE`).
      default: "0 (unlimited)"

    patroni_api_urls:
      config:
        en: "Default Patroni REST API endpoints. Pools inherit this unless they set their own patroni_api_urls."
        ru: "URL Patroni REST API по умолчанию. Пулы наследуют, если не задали собственные patroni_api_urls."
      default: "not set (disabled)"

    fallback_cooldown:
      config:
        en: "Default cooldown for the local backend after a failed connect. Pools inherit this unless they set their own."
        ru: "Период по умолчанию, на который локальный backend помечается недоступным после неудачного коннекта. Пулы наследуют, если не задали собственный."
      default: '"30s"'

    patroni_api_timeout:
      config:
        en: "Default HTTP timeout for Patroni API requests. Pools inherit this unless they set their own."
        ru: "HTTP-таймаут запросов к Patroni API по умолчанию. Пулы наследуют, если не задали собственный."
      default: '"5s"'

    fallback_connect_timeout:
      config:
        en: "Default TCP connect timeout for fallback candidates. Pools inherit this unless they set their own."
        ru: "TCP-таймаут к fallback-кандидатам по умолчанию. Пулы наследуют, если не задали собственный."
      default: '"5s"'

    fallback_lifetime:
      config:
        en: "Default lifetime of fallback connections. Pools inherit this unless they set their own."
        ru: "Время жизни fallback-соединений по умолчанию. Пулы наследуют, если не задали собственное."
      default: "same as fallback_cooldown"

    admin_username:
      config:
        en: "Admin username for the virtual admin database (pgdoorman)."
        ru: "Имя администратора для виртуальной базы данных pgdoorman."
      doc: "Access to the virtual admin database is carried out through the administrator's username and password."
      default: '"admin"'

    admin_password:
      config:
        en: |
          Admin password for the virtual admin database.
          IMPORTANT: Change this in production!
        ru: |
          Пароль администратора для виртуальной базы данных.
          ВАЖНО: Обязательно смените пароль в продакшене!
      doc: |
        Access to the virtual admin database is carried out through the administrator's username and password.
        It should be replaced with your secret.
      default: '"admin"'

    tls_certificate:
      config:
        en: |
          Path to the TLS certificate file for incoming client connections.
          Must be used together with tls_private_key.
        ru: |
          Путь к файлу TLS-сертификата для входящих клиентских подключений.
          Должен использоваться вместе с tls_private_key.
      doc: "The path to the certificate file for TLS connections. This is required to enable TLS for incoming client connections. Must be used together with `tls_private_key`."
      default: "None"

    tls_private_key:
      config:
        en: |
          Path to the TLS private key file for incoming client connections.
          Must be used together with tls_certificate.
        ru: |
          Путь к файлу приватного ключа TLS для входящих клиентских подключений.
          Должен использоваться вместе с tls_certificate.
      doc: "The path to the private key file for TLS connections. This is required to enable TLS for incoming client connections. Must be used together with `tls_certificate`."
      default: "None"

    tls_ca_cert:
      config:
        en: |
          Path to the CA certificate for client certificate verification.
          Used with tls_mode = "verify-full"
        ru: |
          Путь к CA-сертификату для верификации клиентских сертификатов.
          Используется с tls_mode = "verify-full"
      doc: "The file containing the CA certificate to verify the client certificate. This is required when `tls_mode` is set to `verify-full`."
      default: "None"

    tls_mode:
      config:
        en: |
          TLS mode for incoming connections:
          - "allow"       : TLS allowed but not required (default)
          - "disable"     : TLS not allowed
          - "require"     : TLS required
          - "verify-full" : TLS required with client certificate verification
        ru: |
          Режим TLS для входящих подключений:
          - "allow"       : TLS разрешён, но не обязателен (по умолчанию)
          - "disable"     : TLS запрещён
          - "require"     : TLS обязателен
          - "verify-full" : TLS обязателен с проверкой клиентского сертификата
      doc: |
        The TLS mode for incoming connections. It can be one of the following:

        * `allow` - TLS connections are allowed but not required. The pg_doorman will attempt to establish a TLS connection if the client requests it.
        * `disable` - TLS connections are not allowed. All connections will be established without TLS encryption.
        * `require` - TLS connections are required. The pg_doorman will only accept connections that use TLS encryption.
        * `verify-full` - TLS connections are required and the pg_doorman will verify the client certificate. This mode provides the highest level of security.
      default: '"allow"'

    tls_rate_limit_per_second:
      config:
        en: |
          Limit simultaneous TLS session creation attempts.
          Useful for applications with many connections at startup ("hot start").
          0 = no limit
        ru: |
          Ограничение на одновременное создание TLS-сессий.
          Полезно для приложений с множеством подключений при старте ("горячий старт").
          0 — без ограничений
      doc: |
        Limit the number of simultaneous attempts to create a TLS session.
        Any value other than zero implies that there is a queue through which clients must pass in order to establish a TLS connection.
        In some cases, this is necessary in order to launch an application that opens many connections at startup (the so-called "hot start").
      default: "0"

    server_tls_mode:
      config:
        en: |
          TLS mode for outgoing connections to PostgreSQL servers:
          - "allow"       : Try plain first; if server rejects, retry with TLS (default)
          - "disable"     : TLS not used
          - "prefer"      : TLS used if server supports it
          - "require"     : TLS required, certificate not verified
          - "verify-ca"   : TLS required, server certificate verified against CA
          - "verify-full" : TLS required, server certificate and hostname verified
        ru: |
          Режим TLS для исходящих подключений к серверам PostgreSQL:
          - "allow"       : сначала plain, при отказе — повтор с TLS (по умолчанию)
          - "disable"     : TLS не используется
          - "prefer"      : TLS используется, если сервер поддерживает
          - "require"     : TLS обязателен, сертификат не проверяется
          - "verify-ca"   : TLS обязателен, сертификат сервера проверяется по CA
          - "verify-full" : TLS обязателен, проверяется сертификат и имя хоста
      doc: |
        TLS mode for outgoing connections to PostgreSQL servers.

        * `allow` — Try plain first; if server rejects, retry with TLS. Matches libpq sslmode=allow (default).
        * `disable` — TLS is not used.
        * `prefer` — TLS is used if the server supports it; plain connection otherwise.
        * `require` — TLS is required, but the server certificate is not verified.
        * `verify-ca` — TLS is required and the server certificate is verified against `server_tls_ca_cert`.
        * `verify-full` — TLS is required, the certificate is verified, and the server hostname must match the certificate.
      default: '"allow"'

    server_tls_ca_cert:
      config:
        en: |
          Path to the CA certificate file for verifying PostgreSQL server certificates.
          Required when server_tls_mode is "verify-ca" or "verify-full".
        ru: |
          Путь к файлу CA-сертификата для проверки сертификатов серверов PostgreSQL.
          Обязателен при server_tls_mode = "verify-ca" или "verify-full".
      doc: "CA certificate for verifying PostgreSQL server certificates. Required when `server_tls_mode` is `verify-ca` or `verify-full`."
      default: "None"

    server_tls_certificate:
      config:
        en: |
          Path to the client TLS certificate for mutual TLS with PostgreSQL servers.
          Used together with server_tls_private_key.
        ru: |
          Путь к клиентскому TLS-сертификату для взаимной TLS-аутентификации с серверами PostgreSQL.
          Используется вместе с server_tls_private_key.
      doc: "Client certificate for mTLS with PostgreSQL servers. Pair with `server_tls_private_key`."
      default: "None"

    server_tls_private_key:
      config:
        en: |
          Path to the private key for the client TLS certificate.
          Used together with server_tls_certificate.
        ru: |
          Путь к приватному ключу клиентского TLS-сертификата.
          Используется вместе с server_tls_certificate.
      doc: "Private key for the mTLS client certificate. Pair with `server_tls_certificate`."
      default: "None"

    daemon_pid_file:
      config:
        en: |
          PID file path for daemon mode.
          Setting this enables daemon mode. Comment out for foreground mode with `-d`.
        ru: |
          Путь к PID-файлу для режима демона.
          Задание этого параметра активирует режим демона. Закомментируйте для запуска на переднем плане с `-d`.
      doc: "Enabling this setting enables daemon mode. Comment this out if you want to run pg_doorman in the foreground with `-d`."
      default: '"/tmp/pg_doorman.pid"'

    hba:
      config:
        en: |
          Simple IP-based access control list.
          List of IP networks allowed to connect (e.g., "10.0.0.0/8").
          Empty list allows all addresses.
          For more advanced access control, use pg_hba instead.
        ru: |
          Простой список контроля доступа по IP.
          Список IP-сетей, которым разрешено подключаться (напр., "10.0.0.0/8").
          Пустой список разрешает все адреса.
          Для более гибкого контроля доступа используйте pg_hba.
      doc: "The list of IP addresses from which it is permitted to connect to the pg-doorman."
      default: "[]"

    pg_hba:
      doc: |
        New-style client access control in native PostgreSQL `pg_hba.conf` format. This allows you to define fine-grained access rules similar to PostgreSQL, including per-database, per-user, address ranges, and TLS requirements.

        You can specify `general.pg_hba` in three ways:

        - As a multi-line string with the contents of a `pg_hba.conf` file
        - As an object with `path` that points to a file on disk
        - As an object with `content` containing the rules as a string

        Examples:

        ```toml
        [general]
        # Inline content (triple-quoted TOML string)
        pg_hba = """
        # type   database  user   address         method
        host     all       all    10.0.0.0/8      md5
        hostssl  all       all    0.0.0.0/0       scram-sha-256
        hostnossl all      all    192.168.1.0/24  trust
        """

        # Or load from file
        # pg_hba = { path = "./pg_hba.conf" }

        # Or embed as a single-line string
        # pg_hba = { content = "host all all 127.0.0.1/32 trust" }
        ```

        Supported fields and methods:
        - Connection types: `local`, `host`, `hostssl`, `hostnossl` (TLS-aware matching is honored)
        - Database matcher: a name or `all`
        - User matcher: a name or `all`
        - Address: CIDR form like `1.2.3.4/32` or `::1/128` (required for non-`local` rules)
        - Methods: `trust`, `md5`, `scram-sha-256` (unknown methods are parsed but treated as not-allowed by the checker)

        Precedence and compatibility:
        - `general.pg_hba` supersedes the legacy `general.hba` list. You cannot set both at the same time; configuration validation will reject this combination.
        - Rules are evaluated in order; the first matching rule decides the outcome.

        Behavior of method = trust:
        - When a matching rule has `trust`, PgDoorman will accept the connection without requesting a password. This mirrors PostgreSQL behavior.
        - Specifically, if `trust` matches, PgDoorman will skip password verification even if the user has an `md5` or `scram-sha-256` password stored. This affects both MD5 and SCRAM flows.
        - TLS constraints from the rule are respected: `hostssl` requires TLS, `hostnossl` forbids TLS.

        Admin console access:
        - `general.pg_hba` rules apply to the special admin database `pgdoorman` as well.
        - This means you can allow admin access with the `trust` method when a matching rule is present, for example:
          ```
          host  pgdoorman  admin  127.0.0.1/32  trust
          ```

        Notes and limitations:
        - Only a minimal subset of `pg_hba.conf` is supported that is sufficient for most proxy use-cases (type, database, user, address, method). Additional options (like `clientcert`) are currently ignored.
        - For authentication methods other than `trust`, PgDoorman performs the corresponding challenge/response with the client.
        - For Talos/JWT/PAM flows configured at the pool/user level, `trust` still bypasses the client password prompt; however, those modes may be used when `trust` does not match.

  pool:
    server_host:
      config:
        en: |
          PostgreSQL server host (IP address or unix socket directory).
          Examples: "127.0.0.1", "/var/run/postgresql"
        ru: |
          Адрес сервера PostgreSQL (IP или директория unix socket).
          Примеры: "127.0.0.1", "/var/run/postgresql"
      doc: |
        The directory with unix sockets or the IPv4 address of the PostgreSQL server that serves this pool.

        Example: `"/var/run/postgresql"` or `"127.0.0.1"`.
      default: '"127.0.0.1"'

    server_port:
      config:
        en: "PostgreSQL server port."
        ru: "Порт сервера PostgreSQL."
      doc: "The port through which PostgreSQL server accepts incoming connections."
      default: "5432"

    server_database:
      config:
        en: |
          Actual database name on the PostgreSQL server.
          If not specified, the pool name is used.
        ru: |
          Имя реальной базы данных на сервере PostgreSQL.
          Если не указано, используется имя пула.
      doc: "Optional parameter that determines which database should be connected to on the PostgreSQL server."

    pool_mode:
      config:
        en: |
          Pooling mode (same as PgBouncer's pool_mode):
          - "transaction" : backend released after each transaction (recommended)
          - "session"     : backend held for the entire client session
        ru: |
          Режим пулинга (аналог pool_mode в PgBouncer):
          - "transaction" : бэкенд освобождается после каждой транзакции (рекомендуется)
          - "session"     : бэкенд удерживается на всю клиентскую сессию
      doc: |
        When the backend connection is returned to the pool.
        `transaction`: released after each transaction. `session`: held until client disconnects.
        Same as PgBouncer's `pool_mode`.
      default: '"transaction"'

    connect_timeout:
      config:
        en: "Override global connect_timeout for this pool (in milliseconds)."
        ru: "Переопределить глобальный connect_timeout для этого пула (в миллисекундах)."
      doc: "Maximum time to allow for establishing a new server connection for this pool, in milliseconds. If not specified, the global connect_timeout setting is used."
      default: "None (uses global setting)"

    idle_timeout:
      config:
        en: "Override global idle_timeout for this pool (in milliseconds)."
        ru: "Переопределить глобальный idle_timeout для этого пула (в миллисекундах)."
      doc: "Close idle connections in this pool that have been opened for longer than this value, in milliseconds. If not specified, the global idle_timeout setting is used."
      default: "None (uses global setting)"

    server_lifetime:
      config:
        en: "Override global server_lifetime for this pool (in milliseconds)."
        ru: "Переопределить глобальный server_lifetime для этого пула (в миллисекундах)."
      doc: "Close server connections in this pool that have been opened for longer than this value, in milliseconds. Only applied to idle connections. If not specified, the global server_lifetime setting is used."
      default: "None (uses global setting)"

    cleanup_server_connections:
      config:
        en: |
          Reset session state (SET, prepared statements, cursors) when returning a connection to pool.
          ROLLBACK for open transactions is always executed regardless of this setting.
          Prevents state leaking between clients in transaction mode.
        ru: |
          Сбрасывать состояние сессии (SET, prepared statements, курсоры) при возврате соединения в пул.
          ROLLBACK для открытых транзакций выполняется всегда независимо от этой настройки.
          Предотвращает утечку состояния между клиентами в транзакционном режиме.
      doc: |
        Controls whether pg_doorman resets session state when a connection is returned to the pool.
        When enabled and the session was modified, pg_doorman sends: `RESET ROLE`, plus conditionally
        `RESET ALL` (if SET was used), `DEALLOCATE ALL` (if PREPARE was used), `CLOSE ALL` (if cursors
        were opened). Note: `ROLLBACK` for open transactions is always executed regardless of this setting.
        Disable only if your application never uses SET, prepared statements, or cursors and you want
        to save the cleanup roundtrip.
      default: "true"

    prepared_statements_cache_size:
      config:
        en: "Override global prepared_statements_cache_size for this pool."
        ru: "Переопределить глобальный prepared_statements_cache_size для этого пула."
      doc: "Override global prepared_statements_cache_size for this pool. If not specified, the global setting is used."

    scaling_warm_pool_ratio:
      config:
        en: "Override global scaling_warm_pool_ratio for this pool (0-100)."
        ru: "Переопределить глобальный scaling_warm_pool_ratio для этого пула (0-100)."
      doc: "Override global scaling_warm_pool_ratio for this pool. If not specified, the global setting is used."

    scaling_fast_retries:
      config:
        en: "Override global scaling_fast_retries for this pool."
        ru: "Переопределить глобальный scaling_fast_retries для этого пула."
      doc: "Override global scaling_fast_retries for this pool. If not specified, the global setting is used."

    max_db_connections:
      config:
        en: |
          Maximum total server connections to this database across all users.
          When the limit is reached, idle connections from other users are evicted.
          0 = disabled (default): each user pool works independently.
        ru: |
          Максимальное суммарное число серверных соединений к этой БД по всем пользователям.
          При достижении лимита idle-соединения других пользователей изымаются.
          0 = выключено (по умолчанию): каждый пул пользователя работает независимо.
      doc: |
        Hard cap on the total number of server connections to this database, shared across all user
        pools. When the limit is reached and a new connection is needed, the coordinator first tries
        to evict idle connections from other users (respecting their `min_pool_size`), then waits
        for a connection to be returned, and finally falls back to the reserve pool. Set to `0`
        (or omit) to disable coordination — each user pool works independently, capped only by its
        own `pool_size`. Similar to PgBouncer's `max_db_connections`.
      default: "0 (disabled)"

    min_connection_lifetime:
      config:
        en: |
          Don't evict connections younger than this (milliseconds).
          Protects freshly created connections from eviction churn
          between user pools sharing the same database.
        ru: |
          Не изымать соединения моложе этого значения (миллисекунды).
          Защищает свежесозданные соединения от постоянного churn'а
          между user-пулами, разделяющими одну базу данных.
      doc: |
        Minimum age (in milliseconds) a connection must reach before it can be evicted by the
        pool coordinator. Prevents cyclic reconnect between user pools that share the same
        database: without this gate, one user's idle slot becomes evictable the moment its
        peer asks for a permit, and under sustained multi-user load each pool steals a slot
        back from its neighbour every few seconds. Only relevant when `max_db_connections > 0`.
      default: "30000 (30 seconds)"

    reserve_pool_size:
      config:
        en: |
          Extra connections beyond max_db_connections, used as last resort.
          Allocated by priority: users below min_pool_size get served first.
        ru: |
          Дополнительные соединения сверх max_db_connections, крайняя мера.
          Распределяются по приоритету: пользователи ниже min_pool_size обслуживаются первыми.
      doc: |
        Number of extra connections allowed beyond `max_db_connections` as a last resort. When
        eviction fails and no connections are returned within `reserve_pool_timeout`, a reserve
        connection is granted to the highest-priority requester. Users below their `min_pool_size`
        get absolute priority. Only relevant when `max_db_connections > 0`.
      default: "0"

    reserve_pool_timeout:
      config:
        en: |
          Wait time (milliseconds) before falling back to reserve pool.
          During this time the coordinator waits for a connection to be returned.
        ru: |
          Время ожидания (миллисекунды) перед использованием резервного пула.
          В течение этого времени координатор ждёт возврата соединения.
      doc: |
        How long (in milliseconds) to wait for a regular connection to become available before
        falling back to the reserve pool. During this window the coordinator listens for returned
        connections. Only relevant when `max_db_connections > 0` and `reserve_pool_size > 0`.
      default: "3000 (3 seconds)"

    min_guaranteed_pool_size:
      config:
        en: |
          Minimum connections per user protected from coordinator eviction.
          Unlike min_pool_size (which triggers prewarm/replenish), this only
          affects eviction: the coordinator will never evict a user's connections
          below this number. Does not create connections proactively.
          Useful when min_pool_size = 0 for most users (no prewarm desired)
          but you still want eviction fairness under max_db_connections pressure.
        ru: |
          Минимум соединений на пользователя, защищённых от изъятия координатором.
          В отличие от min_pool_size (который прогревает пул заранее), этот параметр
          влияет только на eviction: координатор не будет изымать соединения пользователя
          ниже этого числа. Не создаёт соединения проактивно.
          Полезен когда min_pool_size = 0 (прогрев не нужен), но нужна справедливость
          изъятия при давлении max_db_connections.
      doc: |
        Pool-level default for the minimum number of connections per user that are protected
        from coordinator eviction. When the coordinator needs to free a connection slot for
        another user, it will not evict connections from a user who is at or below this count.

        This is separate from `min_pool_size` (user-level): `min_pool_size` controls prewarm
        and replenish (proactively creating connections), while `min_guaranteed_pool_size`
        only affects eviction decisions (never creates connections).

        The effective protection for a user is `max(user.min_pool_size, pool.min_guaranteed_pool_size)`.
        Set to `0` (or omit) for no eviction protection. Only relevant when `max_db_connections > 0`.
      default: "0 (no protection)"

    patroni_api_urls:
      config:
        en: |
          Patroni REST API endpoints. When the local backend becomes
          unreachable, pg_doorman queries /cluster to find a live fallback host.
        ru: |
          Эндпоинты Patroni REST API. Когда локальный backend становится
          недоступен, pg_doorman запрашивает /cluster для поиска живого хоста.
      default: "disabled"

    fallback_cooldown:
      config:
        en: |
          How long the local backend stays marked as down after a failed connect.
        ru: |
          Как долго локальный backend остаётся помеченным как недоступный после
          неудачного коннекта.
      default: "\"30s\""

    patroni_api_timeout:
      config:
        en: |
          HTTP timeout for Patroni API requests.
        ru: |
          HTTP-таймаут запросов к Patroni API.
      default: "\"5s\""

    fallback_connect_timeout:
      config:
        en: |
          TCP connect timeout for fallback candidates.
        ru: |
          TCP-таймаут для коннекта к fallback-кандидатам.
      default: "\"5s\""

    fallback_lifetime:
      config:
        en: |
          Lifetime of fallback connections; defaults to fallback_cooldown.
        ru: |
          Время жизни fallback-соединений; по умолчанию равно fallback_cooldown.
      default: "fallback_cooldown"

    application_name:
      config:
        en: |
          Application name sent to PostgreSQL when opening connections.
          Useful when sync_server_parameters is disabled.
        ru: |
          Имя приложения, отправляемое PostgreSQL при открытии соединений.
          Полезно, когда sync_server_parameters отключён.
      doc: "Parameter application_name, is sent to the server when opening a connection with PostgreSQL. It may be useful with the sync_server_parameters = false setting."

    log_client_parameter_status_changes:
      config:
        en: "Log SET commands from clients."
        ru: "Логировать SET-команды от клиентов."
      doc: "Log information about any SET command in the log."
      default: "false"

    server_tls_mode:
      config:
        en: "Override global server_tls_mode for this pool."
        ru: "Переопределить глобальный server_tls_mode для этого пула."
      doc: "Per-pool override of `server_tls_mode`."
      default: "None (uses global setting)"

    server_tls_ca_cert:
      config:
        en: "Override CA certificate path for TLS server verification in this pool."
        ru: "Переопределить путь к CA-сертификату для проверки TLS-сервера в этом пуле."
      doc: "Per-pool override of `server_tls_ca_cert`."
      default: "None (uses global setting)"

    server_tls_certificate:
      config:
        en: "Override client TLS certificate path for this pool."
        ru: "Переопределить путь к клиентскому TLS-сертификату для этого пула."
      doc: "Per-pool override of `server_tls_certificate`."
      default: "None (uses global setting)"

    server_tls_private_key:
      config:
        en: "Override client TLS private key path for this pool."
        ru: "Переопределить путь к приватному ключу TLS-клиента для этого пула."
      doc: "Per-pool override of `server_tls_private_key`."
      default: "None (uses global setting)"

  user:
    username:
      config:
        en: "Username for client authentication. Clients connect with this name."
        ru: "Имя пользователя для аутентификации. Клиенты подключаются с этим именем."
      doc: "The username that clients use to connect to this pool. Must be unique within the pool."

    password:
      config:
        en: |
          Password hash or JWT key path for client authentication.
          Formats:
          - MD5: "md5" + md5(password + username)
          - SCRAM-SHA-256: "SCRAM-SHA-256$iterations:salt$StoredKey:ServerKey"
          - JWT public key: "jwt-pkey-fpath:/path/to/public.pem"

          Generate MD5: echo -n "passwordusername" | md5sum
          Copy from PostgreSQL: SELECT usename, passwd FROM pg_shadow;
        ru: |
          Хеш пароля или путь к JWT-ключу для аутентификации клиента.
          Форматы:
          - MD5: "md5" + md5(пароль + имя_пользователя)
          - SCRAM-SHA-256: "SCRAM-SHA-256$iterations:salt$StoredKey:ServerKey"
          - JWT: "jwt-pkey-fpath:/path/to/public.pem"

          Сгенерировать MD5: echo -n "парольимяпользователя" | md5sum
          Скопировать из PostgreSQL: SELECT usename, passwd FROM pg_shadow;
      doc: |
        Password verifier for client authentication. Supports MD5, SCRAM-SHA-256, and JWT formats.
        You can copy password hashes directly from PostgreSQL: `SELECT usename, passwd FROM pg_shadow`.

    pool_size:
      config:
        en: |
          Max backend connections to PostgreSQL for this user.
          Similar to PgBouncer's default_pool_size but set per-user.
        ru: |
          Максимум серверных соединений с PostgreSQL для этого пользователя.
          Аналог default_pool_size в PgBouncer, но задаётся для каждого пользователя.
      doc: "Maximum number of backend connections to PostgreSQL for this user. In transaction mode, connections are shared across clients, so this is usually much less than the number of clients. Similar to PgBouncer's `default_pool_size`, but configured per-user rather than globally."
      default: "40"

    min_pool_size:
      config:
        en: |
          Minimum connections to maintain in the pool.
          Prewarmed at startup, then maintained by retain cycle.
          Must be <= pool_size.
        ru: |
          Минимальное количество соединений для поддержания в пуле.
          Создаются при старте (prewarm), затем поддерживаются retain-циклом.
          Должно быть <= pool_size.
      doc: "The minimum number of connections to maintain in the pool for this user. Connections are prewarmed at startup (before the first retain cycle) and then maintained by periodic replenishment. If specified, it must be less than or equal to pool_size."
      default: "None"

    pool_mode:
      config:
        en: "Override pool-level pool_mode for this user."
        ru: "Переопределить pool_mode пула для этого пользователя."
      doc: "Override pool-level pool_mode for this user. If not specified, the pool's pool_mode setting is used."

    server_lifetime:
      config:
        en: "Override pool-level server_lifetime for this user (in milliseconds)."
        ru: "Переопределить server_lifetime пула для этого пользователя (в миллисекундах)."
      doc: "Close server connections for this user that have been opened for longer than this value, in milliseconds. Only applied to idle connections. If not specified, the pool's server_lifetime setting is used."
      default: "None (uses pool setting)"

    server_username:
      config:
        en: |
          Override the PostgreSQL username for backend connections.
          If not set, pg_doorman connects as 'username' using passthrough auth.
        ru: |
          Переопределить имя пользователя PostgreSQL для серверных подключений.
          Если не задано, pg_doorman подключается как 'username' через passthrough auth.
      doc: |
        The real PostgreSQL username used to connect to the database server.

        By default, PgDoorman uses the same `username` for both client authentication and server connections, using **passthrough authentication**: the cryptographic material from the client's authentication (MD5 hash or SCRAM ClientKey) is reused to authenticate to the backend. This eliminates the need for plaintext `server_password`.

        **Passthrough mode** (recommended for identity-matching users):
        - Omit both `server_username` and `server_password`
        - pg_doorman reuses the client's auth proof to connect to PostgreSQL
        - For MD5: the hash from `password` is used directly
        - For SCRAM: the ClientKey is extracted from the client's first SCRAM auth and cached
        - Requirement: the `password` verifier must match `pg_authid` on the backend (same salt/iterations for SCRAM, same hash for MD5)

        **Explicit credentials mode** (when identities differ):
        - Set `server_username` and `server_password` to the actual PostgreSQL credentials
        - `server_password` requires `server_username` to be set
        - `server_username` alone (without `server_password`) is allowed for trust authentication

    server_password:
      config:
        en: |
          Plaintext password for backend connections.
          If not set, pg_doorman uses passthrough auth (reuses client's auth proof).
        ru: |
          Пароль открытым текстом для серверных подключений.
          Если не задан, pg_doorman использует passthrough auth (повторно использует аутентификацию клиента).
      doc: |
        The plaintext password for the PostgreSQL server user specified in `server_username`.

        When `server_password` is not set and the user is passthrough-eligible (no `server_username` or `server_username` equals `username`), PgDoorman uses passthrough authentication instead: the cryptographic material from the client's authentication is reused for the backend connection. This eliminates plaintext passwords from config files.

        `server_password` requires `server_username` to be set.

    auth_pam_service:
      config:
        en: "PAM service name for PAM authentication (requires 'pam' feature)."
        ru: "Имя PAM-сервиса для PAM-аутентификации (требуется фича 'pam')."
      doc: "The pam-service that is responsible for client authorization. In this case, pg_doorman will ignore the `password` value."

  auth_query:
    query:
      config:
        en: |
          SQL query to fetch user credentials.
          Must return a column named 'passwd' or 'password' with the password hash.
          If the query returns a single column, it is used regardless of name.
          Use $1 as the placeholder for the username parameter.
        ru: |
          SQL-запрос для получения учётных данных пользователя.
          Должен возвращать столбец с именем 'passwd' или 'password' с хешем пароля.
          Если запрос возвращает ровно один столбец, он используется независимо от имени.
          Используйте $1 как параметр для имени пользователя.
      doc: |
        SQL query to fetch credentials. Must return a column named `passwd` or `password` containing the MD5 or SCRAM hash. If the query returns exactly one column, it is used regardless of name. Any extra columns are ignored. Use `$1` as the placeholder for the username parameter.

        Example: `"SELECT passwd FROM pg_shadow WHERE usename = $1"`

    user:
      config:
        en: "PostgreSQL username for executor connections that run auth queries."
        ru: "Имя пользователя PostgreSQL для соединений-исполнителей, выполняющих auth-запросы."
      doc: "PostgreSQL username for the executor connection that runs auth queries."

    password:
      config:
        en: "Password for the executor user (plaintext). Can be empty for trust authentication."
        ru: "Пароль для пользователя-исполнителя (открытым текстом). Может быть пустым при trust-аутентификации."
      doc: "Password for the executor user (plaintext). Can be empty if the PostgreSQL server uses `trust` authentication for this user."
      default: '""'

    database:
      config:
        en: "Database for executor connections. If not specified, the pool name is used."
        ru: "База данных для соединений-исполнителей. Если не указана, используется имя пула."
      doc: "Database for executor connections. If not specified, the pool name is used."
      default: "None (uses pool name)"

    workers:
      config:
        en: |
          How many persistent connections to PostgreSQL are used for running auth queries.
          These connections only execute the auth_query SQL, not client data traffic.
        ru: |
          Сколько постоянных соединений с PostgreSQL используется для выполнения auth-запросов.
          Эти соединения выполняют только auth_query SQL, а не клиентский трафик данных.
      doc: |
        Number of persistent connections to PostgreSQL dedicated to running the `auth_query` SQL.
        These connections are opened at startup and kept alive. They handle credential lookups only —
        client data traffic goes through separate data pool connections (`pool_size`).
        Increase if you see auth latency spikes under high connection rates.
      default: "2"

    server_user:
      config:
        en: |
          Backend PostgreSQL user for data connections (dedicated mode).
          When set, all dynamic users share one connection pool as this user.
          When not set, passthrough mode is used (per-user pools).
        ru: |
          Пользователь PostgreSQL для подключений данных (dedicated mode).
          Если задан, все динамические пользователи используют один пул от имени этого пользователя.
          Если не задан, используется passthrough mode (отдельный пул для каждого пользователя).
      doc: "Backend PostgreSQL user for data connections in dedicated mode. When set, all dynamically authenticated users share one connection pool that connects as this user. When not set, passthrough mode is used."
      default: "None (passthrough mode)"

    server_password:
      config:
        en: "Plaintext password for server_user. Only used in dedicated mode."
        ru: "Пароль для server_user открытым текстом. Используется только в dedicated mode."
      doc: "Plaintext password for the `server_user`. Only meaningful when `server_user` is set."
      default: "None"

    pool_size:
      config:
        en: |
          Max backend connections per data pool created by auth_query.
          Same meaning as users[].pool_size for static pools.
        ru: |
          Максимум серверных соединений на один пул данных, создаваемый через auth_query.
          Аналог users[].pool_size для статических пулов.
      doc: |
        Maximum number of backend connections per data pool created by auth_query.
        Same concept as `users[].pool_size` for statically defined users.
        How many pools are created depends on the mode: `server_user` controls whether
        all dynamic users share one pool or each gets their own.
      default: "40"

    min_pool_size:
      config:
        en: "Minimum connections to maintain per dynamic user pool (passthrough mode only)."
        ru: "Минимальное количество поддерживаемых соединений для каждого динамического пула (только passthrough-режим)."
      doc: "Minimum number of backend connections to maintain per dynamic user pool in passthrough mode. Connections are prewarmed when the pool is first created and replenished by the retain cycle. Set to `0` to disable (default). Note: pools with `min_pool_size > 0` are never garbage-collected, and total backend connections scale as `active_users × min_pool_size`."
      default: "0"

    cache_ttl:
      config:
        en: "Maximum cache age for successfully fetched credentials."
        ru: "Максимальный срок хранения успешно полученных учётных данных в кеше."
      doc: "Maximum cache age for successfully fetched credentials. Accepts duration strings like `\"1h\"`, `\"30m\"`, `\"300s\"`."
      default: '"1h"'

    cache_failure_ttl:
      config:
        en: "Cache TTL for \"user not found\" entries (negative cache)."
        ru: "Время жизни в кеше для записей \"пользователь не найден\" (негативный кеш)."
      doc: "Cache TTL for \"user not found\" entries (negative cache). Prevents repeated queries for non-existent users."
      default: '"30s"'

    min_interval:
      config:
        en: "Minimum interval between re-fetches for the same user after auth failure."
        ru: "Минимальный интервал между повторными запросами для того же пользователя после неудачной аутентификации."
      doc: "Minimum interval between re-fetches for the same username after an authentication failure. Protects the backend from excessive queries during brute-force attempts."
      default: '"1s"'

  prometheus:
    enabled:
      config:
        en: "Enable Prometheus metrics exporter."
        ru: "Включить экспорт метрик Prometheus."
      doc: "Enable or disable the Prometheus metrics exporter."
      default: "false"

    host:
      config:
        en: "Host for the metrics HTTP endpoint."
        ru: "Адрес HTTP-эндпоинта для метрик."
      doc: "The host on which the Prometheus metrics exporter will listen."
      default: '"0.0.0.0"'

    port:
      config:
        en: "Port for the metrics HTTP endpoint."
        ru: "Порт HTTP-эндпоинта для метрик."
      doc: "The port on which the Prometheus metrics exporter will listen."
      default: "9127"
