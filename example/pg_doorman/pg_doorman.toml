# pg_doorman configuration with auth_query (passthrough mode)
#
# Users are looked up dynamically from PostgreSQL via pg_shadow.
# No static user list needed — any PostgreSQL user can connect through pg_doorman.
# Each user gets their own connection pool (passthrough mode).
#
# Usage:
#   docker compose up -d
#   psql -h 127.0.0.1 -p 6432 -U app_user -d exampledb       # password: app_password
#   psql -h 127.0.0.1 -p 6432 -U readonly_user -d exampledb   # password: readonly_pass

[general]
host = "0.0.0.0"
port = 6432
admin_username = "admin"
admin_password = "admin"
tls_private_key = "/etc/pg_doorman/server.key"
tls_certificate = "/etc/pg_doorman/server.crt"

[general.pg_hba]
path = "/etc/pg_doorman/pg_hba.conf"

[pools.exampledb]
server_host = "postgres"
server_port = 5432
pool_mode = "transaction"

[pools.exampledb.auth_query]
query = "SELECT passwd FROM pg_shadow WHERE usename = $1"
user = "postgres"
password = ""
workers = 2
pool_size = 20
cache_ttl = "5m"
cache_failure_ttl = "30s"
min_interval = "1s"
