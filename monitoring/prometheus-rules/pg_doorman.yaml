groups:
  - name: pg_doorman_recording
    interval: 30s
    rules:
      - record: pg_doorman:pool_waiting_clients:sum
        expr: |
          sum by (job, instance, user, database) (
            pg_doorman_pools_clients{status="waiting"}
          )

      - record: pg_doorman:pool_active_server_utilization:ratio
        expr: |
          sum by (job, instance, user, database) (
            pg_doorman_pools_servers{status="active"}
          )
          /
          clamp_min(
            sum by (job, instance, user, database) (pg_doorman_pool_size),
            1
          )

      - record: pg_doorman:coordinator_usage:ratio
        expr: |
          sum by (job, instance, database) (
            pg_doorman_pool_coordinator{type="connections"}
          )
          /
          clamp_min(
            sum by (job, instance, database) (
              pg_doorman_pool_coordinator{type="max_connections"}
            ),
            1
          )

      - record: pg_doorman:coordinator_reserve_usage:ratio
        expr: |
          sum by (job, instance, database) (
            pg_doorman_pool_coordinator{type="reserve_in_use"}
          )
          /
          clamp_min(
            sum by (job, instance, database) (
              pg_doorman_pool_coordinator{type="reserve_pool_size"}
            ),
            1
          )

      - record: pg_doorman:pool_scaling_create_rate5m
        expr: |
          sum by (job, instance, user, database) (
            rate(pg_doorman_pool_scaling_total{type="creates_started"}[5m])
          )

      - record: pg_doorman:pool_scaling_gate_wait_rate5m
        expr: |
          sum by (job, instance, user, database) (
            rate(pg_doorman_pool_scaling_total{type="burst_gate_waits"}[5m])
          )

      - record: pg_doorman:pool_scaling_create_fallback_rate5m
        expr: |
          sum by (job, instance, user, database) (
            rate(pg_doorman_pool_scaling_total{type="create_fallback"}[5m])
          )

      - record: pg_doorman:auth_query_lookup_rate5m
        expr: |
          sum by (job, instance, database) (
            clamp_min(rate(pg_doorman_auth_query_cache{type=~"hits|misses"}[5m]), 0)
          )

      - record: pg_doorman:auth_query_cache_hit:ratio
        expr: |
          sum by (job, instance, database) (
            clamp_min(rate(pg_doorman_auth_query_cache{type="hits"}[5m]), 0)
          )
          /
          clamp_min(
            sum by (job, instance, database) (
              clamp_min(rate(pg_doorman_auth_query_cache{type=~"hits|misses"}[5m]), 0)
            ),
            0.001
          )

      - record: pg_doorman:auth_query_failure:ratio
        expr: |
          sum by (job, instance, database) (
            clamp_min(rate(pg_doorman_auth_query_auth{result="failure"}[5m]), 0)
          )
          /
          clamp_min(
            sum by (job, instance, database) (
              clamp_min(rate(pg_doorman_auth_query_auth{result=~"success|failure"}[5m]), 0)
            ),
            0.001
          )

      - record: pg_doorman:prepared_lookup_rate5m
        expr: |
          sum by (job, instance, user, database) (
            clamp_min(rate(pg_doorman_servers_prepared_hits[5m]), 0)
          )
          +
          sum by (job, instance, user, database) (
            clamp_min(rate(pg_doorman_servers_prepared_misses[5m]), 0)
          )

      - record: pg_doorman:prepared_hit:ratio
        expr: |
          sum by (job, instance, user, database) (
            clamp_min(rate(pg_doorman_servers_prepared_hits[5m]), 0)
          )
          /
          clamp_min(
            sum by (job, instance, user, database) (
              clamp_min(rate(pg_doorman_servers_prepared_hits[5m]), 0)
            )
            +
            sum by (job, instance, user, database) (
              clamp_min(rate(pg_doorman_servers_prepared_misses[5m]), 0)
            ),
            0.001
          )

      - record: pg_doorman:prepared_cache_memory:bytes
        expr: |
          sum by (job, instance, user, database) (pg_doorman_pool_prepared_cache_bytes)
          +
          sum by (job, instance, user, database) (pg_doorman_clients_prepared_cache_bytes)

      - record: pg_doorman:server_tls_handshake_duration_seconds:p99
        expr: |
          histogram_quantile(
            0.99,
            sum by (job, instance, pool, le) (
              rate(pg_doorman_server_tls_handshake_duration_seconds_bucket[5m])
            )
          )

      - record: pg_doorman:patroni_api_duration_seconds:p99
        expr: |
          histogram_quantile(
            0.99,
            sum by (job, instance, pool, le) (
              rate(pg_doorman_patroni_api_duration_seconds_bucket[5m])
            )
          )

  - name: pg_doorman_pool_health
    interval: 30s
    rules:
      - alert: PgDoormanPoolWaitingClients
        expr: pg_doorman:pool_waiting_clients:sum > 0
        for: 5m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman clients waiting in {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            Check SHOW POOLS and SHOW POOL_SCALING. Sustained waiting means
            the pool cannot hand out backend connections quickly enough; look
            for high cl_waiting, sv_active near pool_size, or create_fallback.

      - alert: PgDoormanPoolSaturated
        expr: |
          pg_doorman:pool_active_server_utilization:ratio > 0.95
          and on (job, instance, user, database)
          pg_doorman:pool_waiting_clients:sum > 0
        for: 5m
        labels:
          severity: critical
          service: pg_doorman
        annotations:
          summary: "pg_doorman pool saturated for {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            Active backend usage is above 95% and clients are waiting.
            Increase pool_size if PostgreSQL has headroom, or find long
            transactions holding server connections out of rotation.

      - alert: PgDoormanPoolWaitTimeHigh
        expr: |
          max by (job, instance, user, database) (
            pg_doorman_pools_avg_wait_time
          ) > 250
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman average wait time > 250ms for {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            Check SHOW POOLS, SHOW STATS, and slow query latency. If p99 query
            or transaction time is rising, fix the backend workload first; if
            only wait time is high, inspect pool scaling and coordinator state.

      - alert: PgDoormanLongActiveCheckout
        expr: pg_doorman_pools_oldest_active_age_ms > 300000
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman active checkout older than 5m in {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            A server connection has been checked out for a long time. Inspect
            PostgreSQL pg_stat_activity for long transactions, idle-in-
            transaction sessions, or slow queries from the affected pool user.

      - alert: PgDoormanProcessMemoryHigh
        expr: pg_doorman_total_memory > 2147483648
        for: 15m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman RSS > 2GiB on {{ $labels.instance }}"
          runbook: |
            Correlate RSS with prepared cache, query interner, socket count,
            and connection count. If prepared or interner memory dominates,
            reduce cache sizes or fix dynamic SQL / dynamic statement names.

  - name: pg_doorman_pool_pressure
    interval: 30s
    rules:
      - alert: PgDoormanCoordinatorExhausted
        expr: |
          sum by (job, instance, database) (
            rate(pg_doorman_pool_coordinator_total{type="exhaustions"}[5m])
          ) > 0
        for: 1m
        labels:
          severity: critical
          service: pg_doorman
        annotations:
          summary: "pg_doorman coordinator exhausted for {{ $labels.database }}"
          runbook: |
            A client received a database-exhausted error. Run SHOW
            POOL_COORDINATOR and SHOW POOLS. If current == max_db_conn +
            reserve_size, raise max_db_connections or reserve_pool_size after
            confirming PostgreSQL max_connections headroom.

      - alert: PgDoormanCoordinatorNearLimit
        expr: pg_doorman:coordinator_usage:ratio > 0.85
        for: 15m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman coordinator above 85% for {{ $labels.database }}"
          runbook: |
            This is capacity lead time before exhaustion. If current climbs
            steadily, raise max_db_connections. If it oscillates near the cap,
            size reserve_pool_size for the burst pattern.

      - alert: PgDoormanCoordinatorReserveInUse
        expr: min_over_time(pg_doorman_pool_coordinator{type="reserve_in_use"}[15m]) > 0
        for: 1m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman coordinator reserve continuously in use for {{ $labels.database }}"
          runbook: |
            Reserve should return to zero after retain_connections_time when
            main has headroom. Compute main_used = current - reserve_used in
            SHOW POOL_COORDINATOR; if main_used == max_db_conn, the database
            is undersized.

      - alert: PgDoormanCoordinatorThrashing
        expr: |
          pg_doorman:coordinator_usage:ratio > 0.95
          and on (job, instance, database)
          sum by (job, instance, database) (
            rate(pg_doorman_pool_coordinator_total{type="evictions"}[5m])
          ) > 0
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman coordinator evicting while near cap for {{ $labels.database }}"
          runbook: |
            The coordinator is closing peer idle connections to make room.
            Enable or raise reserve_pool_size for burst absorption; if reserve
            and evictions both climb, raise max_db_connections after checking
            PostgreSQL capacity.

      - alert: PgDoormanBurstGateSaturated
        expr: |
          pg_doorman:pool_scaling_gate_wait_rate5m
            > 0.5 * pg_doorman:pool_scaling_create_rate5m
          and on (job, instance, user, database)
          pg_doorman:pool_scaling_create_rate5m > 0.1
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman burst gate saturated for {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            Check SHOW POOL_SCALING. If inflight_creates sits at the cap,
            backend connect/auth/startup is slow. If inflight cycles below the
            cap, raise scaling_max_parallel_creates within the documented
            safety ceiling.

      - alert: PgDoormanCreateFallbackFiring
        expr: |
          pg_doorman:pool_scaling_create_fallback_rate5m > 0.1
          and on (job, instance, user, database)
          pg_doorman:pool_scaling_create_rate5m > 0.1
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman anticipation falls through to creates for {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            Phase 4 is not catching returned connections before deadline. If
            transaction latency is high, fix slow queries; otherwise raise
            pool_size or query_wait_timeout for the affected workload.

      - alert: PgDoormanReplenishDeferred
        expr: increase(pg_doorman_pool_scaling_total{type="replenish_deferred"}[1h]) > 60
        for: 5m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman replenish deferred for {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            Background min_pool_size replenish is losing the burst gate to
            client traffic. If sv_idle + sv_active stays below min_pool_size,
            raise scaling_max_parallel_creates or accept min_pool_size as
            best-effort during load.

      - alert: PgDoormanInflightCreatesStuck
        expr: min_over_time(pg_doorman_pool_scaling{type="inflight_creates"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman backend creates continuously in flight for {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            A pool had at least one backend connect/auth/startup in flight for
            the whole window. Time direct psql connect from the pg_doorman
            host and check PostgreSQL pg_stat_activity for startup or
            authenticating sessions.

  - name: pg_doorman_auth_query
    interval: 30s
    rules:
      - alert: PgDoormanAuthQueryExecutorErrors
        expr: |
          sum by (job, instance, database) (
            clamp_min(rate(pg_doorman_auth_query_executor{type="errors"}[5m]), 0)
          ) > 0
        for: 5m
        labels:
          severity: critical
          service: pg_doorman
        annotations:
          summary: "pg_doorman auth_query executor errors for {{ $labels.database }}"
          runbook: |
            Auth query calls to PostgreSQL are failing. Check connectivity,
            auth_query SQL, credentials, and PostgreSQL logs for the auth
            database before restarting pg_doorman.

      - alert: PgDoormanAuthQueryFailuresHigh
        expr: |
          pg_doorman:auth_query_failure:ratio > 0.05
          and on (job, instance, database)
          sum by (job, instance, database) (
            clamp_min(rate(pg_doorman_auth_query_auth{result="failure"}[5m]), 0)
          ) > 0.1
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman auth_query failures > 5% for {{ $labels.database }}"
          runbook: |
            Failure spike after a deploy usually means credential mismatch or
            stale secrets. Sustained failures without a deploy may be bad
            clients; correlate with pg_doorman logs and source addresses.

      - alert: PgDoormanAuthQueryCacheHitRateLow
        expr: |
          pg_doorman:auth_query_cache_hit:ratio < 0.8
          and on (job, instance, database)
          pg_doorman:auth_query_lookup_rate5m > 1
        for: 15m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman auth_query cache hit rate < 80% for {{ $labels.database }}"
          runbook: |
            Low cache hit rate adds latency to new connections and increases
            load on PostgreSQL. Increase auth_query cache_ttl or investigate
            high user churn.

      - alert: PgDoormanAuthQueryRateLimitedRefetches
        expr: |
          sum by (job, instance, database) (
            clamp_min(rate(pg_doorman_auth_query_cache{type="rate_limited"}[5m]), 0)
          ) > 0
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman auth_query refetches rate-limited for {{ $labels.database }}"
          runbook: |
            Clients are retrying auth failures faster than auth_query
            min_interval allows. Check for stale credentials and credential
            rotation timing.

  - name: pg_doorman_prepared_statements
    interval: 30s
    rules:
      - alert: PgDoormanPreparedAnonymousEvictionsHigh
        expr: |
          sum by (job, instance, user, database) (
            rate(pg_doorman_clients_prepared_anonymous_evictions_total[5m])
          ) > 10
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman anonymous prepared LRU evictions > 10/s for {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            client_anonymous_prepared_cache_size is too small for the workload
            or the application generates unique anonymous prepared statements
            on the hot path.

      - alert: PgDoormanPreparedCacheMemoryHigh
        expr: pg_doorman:prepared_cache_memory:bytes > 536870912
        for: 15m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman prepared cache memory > 512MiB for {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            Correlate with named entries, anonymous evictions, and total RSS.
            Dynamic statement names or unique query text usually drive this;
            reduce prepared cache sizes only after identifying the workload.

      - alert: PgDoormanClientNamedPreparedGrowing
        expr: |
          deriv(pg_doorman_clients_prepared_named_entries[30m]) > 0
          and pg_doorman_clients_prepared_named_entries > 10000
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman named prepared entries growing for {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            Named client prepared statements are unbounded until client
            disconnect or DEALLOCATE. Check drivers/frameworks that mint a
            unique prepared statement name per query.

      - alert: PgDoormanPreparedHitRatioLow
        expr: |
          pg_doorman:prepared_hit:ratio < 0.8
          and on (job, instance, user, database)
          pg_doorman:prepared_lookup_rate5m > 1
        for: 15m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman prepared hit ratio < 80% for {{ $labels.user }}@{{ $labels.database }}"
          runbook: |
            Backends are frequently missing prepared statements. Check whether
            applications reuse names consistently and whether pool churn or
            reconnects are invalidating backend-local prepared state.

  - name: pg_doorman_backend_tls
    interval: 30s
    rules:
      - alert: PgDoormanServerTLSHandshakeErrors
        expr: |
          sum by (job, instance, pool) (
            rate(pg_doorman_server_tls_handshake_errors_total[5m])
          ) > 0
        for: 5m
        labels:
          severity: critical
          service: pg_doorman
        annotations:
          summary: "pg_doorman backend TLS handshake errors for {{ $labels.pool }}"
          runbook: |
            New backend TLS connections are failing. Check PostgreSQL TLS
            configuration, CA bundle, certificate hostname, and recent SIGHUP
            certificate reloads.

      - alert: PgDoormanServerTLSHandshakeSlow
        expr: pg_doorman:server_tls_handshake_duration_seconds:p99 > 1
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman backend TLS handshake p99 > 1s for {{ $labels.pool }}"
          runbook: |
            Slow TLS handshakes increase backend create latency. Check CPU,
            certificate verification path, DNS, and PostgreSQL accept/startup
            pressure.

  - name: pg_doorman_patroni_fallback
    interval: 30s
    rules:
      - alert: PgDoormanFallbackActive
        expr: max by (job, instance, pool) (pg_doorman_fallback_active) > 0
        for: 2m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman fallback active for {{ $labels.pool }}"
          runbook: |
            The local backend is in cooldown and new backend connections are
            using a fallback host. Short activations are expected during
            failover; sustained activations mean local PostgreSQL is not
            recovering.

      - alert: PgDoormanFallbackActiveLong
        expr: max by (job, instance, pool) (pg_doorman_fallback_active) > 0
        for: 15m
        labels:
          severity: critical
          service: pg_doorman
        annotations:
          summary: "pg_doorman fallback active for 15m on {{ $labels.pool }}"
          runbook: |
            The local backend has not recovered after multiple cooldown
            windows. Check Patroni state, local PostgreSQL startup, and whether
            pg_doorman can connect to the local socket/host again.

      - alert: PgDoormanPatroniApiErrors
        expr: |
          sum by (job, instance, pool) (
            rate(pg_doorman_patroni_api_errors_total[5m])
          ) > 0
        for: 5m
        labels:
          severity: critical
          service: pg_doorman
        annotations:
          summary: "pg_doorman Patroni API errors for {{ $labels.pool }}"
          runbook: |
            All configured Patroni API URLs are failing or timing out. Check
            Patroni API reachability from the pg_doorman host and make sure at
            least two API URLs are configured for redundancy.

      - alert: PgDoormanPatroniApiSlow
        expr: pg_doorman:patroni_api_duration_seconds:p99 > 1
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman Patroni API p99 > 1s for {{ $labels.pool }}"
          runbook: |
            Slow /cluster calls delay fallback. Check network path, Patroni
            API load, and HTTP timeout settings.

      - alert: PgDoormanFallbackCandidateFailuresHigh
        expr: |
          sum by (job, instance, pool, reason) (
            rate(pg_doorman_fallback_candidate_failures_total[5m])
          ) > 1
        for: 10m
        labels:
          severity: warning
          service: pg_doorman
        annotations:
          summary: "pg_doorman fallback candidate failures high for {{ $labels.pool }}"
          runbook: |
            Candidate startup is failing repeatedly. Use the reason label to
            distinguish connect_error, startup_error, server_unavailable,
            timeout, and other; check credentials and candidate PostgreSQL
            readiness.
