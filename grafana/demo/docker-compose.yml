services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres_secret
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pg_doorman:
    image: pg_doorman:ubuntu2204-tls
    ports:
      - "6432:6432"
      - "9127:9127"
    command: ["pg_doorman", "/etc/pg_doorman/pg_doorman.toml"]
    volumes:
      - ./pg_doorman.toml:/etc/pg_doorman/pg_doorman.toml
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    stop_signal: SIGINT

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - pg_doorman
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

  pgbench:
    image: postgres:16
    volumes:
      - ./pgbench.sh:/pgbench.sh
    entrypoint: ["bash", "/pgbench.sh"]
    environment:
      PGPASSWORD: app_pass
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  pgbench2:
    image: postgres:16
    volumes:
      - ./pgbench2.sh:/pgbench.sh
    entrypoint: ["bash", "/pgbench.sh"]
    environment:
      PGPASSWORD: app_pass_2
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  # Session-mode demo: 3 LISTEN sessions + a slow producer of NOTIFY events.
  # Demonstrates pool_mode = "session" alongside the transaction-mode pgbench
  # workload so the Web UI shows both modes side-by-side.
  listener:
    image: postgres:16
    volumes:
      - ./listener.sh:/listener.sh
    entrypoint: ["bash", "/listener.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  # Session-mode pgbench: 4 long-lived clients hammering session_user with
  # SELECT-only traffic so the Web UI shows the session pool actually busy
  # (active connections, query latency, qps) instead of just three idle
  # LISTENers.
  pgbench-session:
    image: postgres:16
    environment:
      PGPASSWORD: session_pass
    volumes:
      - ./pgbench-session.sh:/pgbench-session.sh
    entrypoint: ["bash", "/pgbench-session.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
