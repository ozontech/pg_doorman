[general]
host = "0.0.0.0"
port = 6432
admin_username = "admin"
admin_password = "admin"
pool_mode = "transaction"
shutdown_timeout = 10000
pg_hba = { content = "host all all 0.0.0.0/0 trust" }

[prometheus]
enabled = true
host = "0.0.0.0"
port = 9127

[pools.app_db]
