[general]
host = "0.0.0.0"
port = 6432
admin_username = "admin"
# Non-default password is required to enable the Web UI; with the default
# `admin` value pg_doorman warns and leaves the SPA disabled.
admin_password = "doorman_demo"
pool_mode = "transaction"
shutdown_timeout = 10000
pg_hba = { content = "host all all 0.0.0.0/0 trust" }

[web]
enabled = true
host = "0.0.0.0"
port = 9127
ui = true
ui_anonymous = false
log_tap_max_entries = 2048

[pools.app_db]
server_host = "postgres"
server_port = 5432
# 10 (app_user) + 10 (app_user_2) + 5 (session_user, long-lived backends).
max_db_connections = 25

[[pools.app_db.users]]
username = "app_user"
password = "md51eb270aee6c83fc6a7a27519d5fa0c9e"
pool_size = 10

[[pools.app_db.users]]
username = "app_user_2"
password = "md5a05c39aae7f2198b1f06c4291434ee85"
pool_size = 10

# Session-mode pool for LISTEN/NOTIFY workloads. pg_doorman keeps each
# client pinned to its own backend for the lifetime of the session, so
# pool_size = concurrent client count.
[[pools.app_db.users]]
username = "app_session"
password = "md5ca9e0f8ef284b8b27348eee420aae511"
pool_size = 5
pool_mode = "session"

# Patroni-assisted fallback (uncomment to enable)
# patroni_api_urls = ["http://10.0.0.1:8008", "http://10.0.0.2:8008"]
# fallback_cooldown = "30s"
# patroni_api_timeout = "5s"
# fallback_connect_timeout = "5s"

[pools.app_db.auth_query]
query = "SELECT username, password FROM pg_doorman_auth($1)"
user = "doorman_auth"
password = "auth_secret"
database = "app_db"
workers = 2
cache_ttl = 60000
