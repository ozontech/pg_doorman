name: Ubicloud Cleanup

permissions:
  contents: read

# Manual emergency cleanup. Lists every VM in the project whose name starts
# with the given prefix and deletes them when confirm_delete=true. Useful when
# a benchmark run leaves a VM behind (runner crash, cancelled job, etc.) so
# nothing keeps billing.

on:
  workflow_dispatch:
    inputs:
      name_prefix:
        description: 'Only touch VMs whose name starts with this'
        required: false
        default: 'bench-'
      confirm_delete:
        description: 'Actually delete (false = dry-run, only list)'
        required: false
        default: false
        type: boolean

env:
  UBI_TOKEN: ${{ secrets.UBICLOUD_API_TOKEN }}
  UBI_VERSION: '1.1.0'
  UBI_LOCATION: eu-central-h1

jobs:
  cleanup:
    name: Cleanup Ubicloud VMs (${{ inputs.name_prefix }}*)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install ubi CLI
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/ubicloud/cli/releases/download/${UBI_VERSION}/ubi-linux-amd64-${UBI_VERSION}.tar.gz" \
            | sudo tar -xzC /usr/local/bin
          ubi version

      - name: List matching VMs
        id: list
        env:
          PREFIX: ${{ inputs.name_prefix }}
        run: |
          set -euo pipefail
          echo "All VMs in $UBI_LOCATION:"
          ubi vm list -l "$UBI_LOCATION"
          echo
          NAMES=$(ubi vm list -l "$UBI_LOCATION" --no-headers \
                   | awk -v p="$PREFIX" '$2 ~ "^"p {print $2}')
          if [ -z "$NAMES" ]; then
            echo "No VMs match prefix '$PREFIX'."
          else
            echo "Matched (prefix '$PREFIX'):"
            echo "$NAMES" | sed 's/^/  /'
          fi
          {
            echo "names<<EOF"
            echo "$NAMES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Delete matching VMs
        if: inputs.confirm_delete == true && steps.list.outputs.names != ''
        env:
          NAMES: ${{ steps.list.outputs.names }}
        run: |
          set -uo pipefail
          fail=0
          while IFS= read -r name; do
            [[ -z "$name" ]] && continue
            if ubi vm "$UBI_LOCATION/$name" destroy; then
              echo "deleted: $name"
            else
              echo "FAILED: $name"
              fail=1
            fi
          done <<< "$NAMES"
          exit "$fail"

      - name: Dry-run notice
        if: inputs.confirm_delete == false
        run: |
          echo "DRY-RUN — set 'confirm_delete' to true and re-run to actually delete."
