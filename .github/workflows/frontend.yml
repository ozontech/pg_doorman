name: Frontend lint, typecheck, dist sync

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  lint-typecheck-build:
    name: lint + typecheck + dist sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Verify committed dist matches source-hash
        # The build itself is not byte-stable across machines (esbuild native
        # binaries differ), so we hash the source tree instead and compare it
        # against `dist/.source-hash` written by `npm run build`. A mismatch
        # means a contributor changed source files without rebuilding dist.
        run: npm run check-dist
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Verify dist exists and is non-empty
        run: |
          test -s frontend/dist/index.html
          test -d frontend/dist/assets
          test "$(ls frontend/dist/assets/*.js 2>/dev/null | wc -l)" -ge 1
          echo "frontend/dist/ shipped with $(ls frontend/dist/assets | wc -l) assets"
