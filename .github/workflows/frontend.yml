name: Frontend lint, typecheck, dist sync

on:
  push:
    branches: [master]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  lint-typecheck-build:
    name: lint + typecheck + dist sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Verify dist exists and is non-empty
        run: |
          test -s frontend/dist/index.html
          test -d frontend/dist/assets
          test "$(ls frontend/dist/assets/*.js 2>/dev/null | wc -l)" -ge 1
          echo "frontend/dist/ shipped with $(ls frontend/dist/assets | wc -l) assets"
        # Strict diff-against-rebuild was attempted but vite/esbuild output is
        # not byte-stable across local and CI runners (different esbuild native
        # binaries despite identical package-lock). Treat the committed
        # frontend/dist/ as the source of truth; phase 7 will revisit with a
        # reproducible-build approach (esbuild pin or build-once-in-CI).
