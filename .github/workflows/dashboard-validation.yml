name: Grafana dashboard validation

on:
  push:
    branches: [master]
    paths:
      - "grafana/**"
      - "monitoring/prometheus-rules/**"
      - "scripts/dashboard-*"
      - "scripts/docker-smoke.sh"
      - "src/web/metrics/**"
      - "src/main.rs"
      - "src/app/**"
      - "src/config/**"
      - "Makefile"
      - "Dockerfile"
      - ".github/workflows/dashboard-validation.yml"
  pull_request:
    paths:
      - "grafana/**"
      - "monitoring/prometheus-rules/**"
      - "scripts/dashboard-*"
      - "scripts/docker-smoke.sh"
      - "src/web/metrics/**"
      - "src/main.rs"
      - "src/app/**"
      - "src/config/**"
      - "Makefile"
      - "Dockerfile"
      - ".github/workflows/dashboard-validation.yml"

permissions:
  contents: read

jobs:
  validate:
    name: smoke + ground-truth on grafana/demo
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python and Postgres clients
        run: |
          # PyYAML drives both scripts. tomli is the 3.10 fallback for
          # tomllib — kept even though setup-python pins 3.11, so that
          # local runs on older Python still pass the same tests.
          # postgresql-client gives us psql for the pg_stat_database
          # ground-truth lookups.
          python -m pip install --upgrade pip
          python -m pip install pyyaml tomli
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Set up Docker Buildx
        # Required for the GHA cache backend below; the legacy docker
        # builder ignores cache-from / cache-to silently.
        uses: docker/setup-buildx-action@v3

      - name: Build pg_doorman:demo image
        # The developer-facing docker-compose.yml uses
        # pg_doorman:ubuntu2204-tls, built from Dockerfile.ubuntu22-tls
        # — that file is gitignored on purpose (commit 91ebd92), so CI
        # cannot use it. Build the public Dockerfile under a separate
        # tag and let docker-compose.ci.yml swap the service image to
        # this one. tls-migration is a binary-upgrade feature; the
        # smoke and ground-truth checks do not depend on it.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: pg_doorman:demo
          load: true
          cache-from: type=gha,scope=pg_doorman-demo
          cache-to: type=gha,scope=pg_doorman-demo,mode=max

      - name: Smoke pg_doorman:demo end-to-end
        # PR-stage smoke: same script the release pipeline runs against
        # the published image (build-packages.yaml docker-image-smoke).
        # Catches a broken Dockerfile, broken generate, and broken
        # startup before they reach a release tag. amd64 only here;
        # arm64 stays in the release smoke because QEMU is expensive
        # for the full E2E flow.
        run: scripts/docker-smoke.sh pg_doorman:demo

      - name: Generate provisioned dashboard JSON
        # The script reads grafana/pg_doorman.json (the artifact); the
        # demo loads grafana/demo/grafana/provisioning/dashboards/...,
        # which is regenerated with the demo's datasource UID.
        run: |
          python -m pip install grafana-foundation-sdk
          GRAFANA_DS_UID=prometheus python3 grafana/generate_dashboard.py \
              > grafana/demo/grafana/provisioning/dashboards/pg_doorman.json

      - name: Run smoke + ground-truth against grafana/demo
        # Demo TPS warms up at different speed across shared GitHub
        # runners, so a single attempt occasionally hits a panel that
        # has not yet populated its rate window. Retry twice with a
        # cleanup tear-down between attempts before failing the job.
        run: |
          set -e
          attempt=1
          max_attempts=3
          until make dashboard-validate-ci; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "dashboard-validate-ci failed after $attempt attempts" >&2
                  exit 1
              fi
              echo "dashboard-validate-ci attempt $attempt failed; tearing down and retrying" >&2
              (cd grafana/demo && docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v) || true
              sleep 5
              attempt=$((attempt + 1))
          done

      - name: Collect demo logs on failure
        if: failure()
        run: |
          mkdir -p _logs
          cd grafana/demo
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps \
              > ../../_logs/ps.txt || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --timestamps \
              > ../../_logs/compose.log 2>&1 || true

      - name: Upload demo logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-validation-logs
          path: _logs/
          retention-days: 7
