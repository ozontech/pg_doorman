name: BDD Tests

permissions:
  contents: read

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/test-runner
  DEBUG: 1

jobs:
  # Job 0: Check if image needs to be rebuilt
  check-image:
    name: Check Image Cache
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      image-tag: ${{ steps.compute-tag.outputs.tag }}
      image-exists: ${{ steps.check-exists.outputs.exists }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image tag from flake files
        id: compute-tag
        run: |
          # Create a hash based on flake.nix and flake.lock content
          FLAKE_HASH=$(cat tests/nix/flake.nix tests/nix/flake.lock | sha256sum | cut -c1-16)
          echo "tag=flake-${FLAKE_HASH}" >> $GITHUB_OUTPUT
          echo "Computed image tag: flake-${FLAKE_HASH}"

      - name: Log in to Container Registry
        # ghcr.io occasionally times out on the auth handshake under
        # GHA load (Client.Timeout exceeded while awaiting headers).
        # docker/login-action runs once; wrap docker login in
        # nick-fields/retry so a transient handshake failure does not
        # take out the whole BDD job.
        uses: nick-fields/retry@v3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "$GHCR_TOKEN" | docker login ${{ env.REGISTRY }} -u "$GHCR_ACTOR" --password-stdin

      - name: Check if image exists in registry
        id: check-exists
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.compute-tag.outputs.tag }}"
          echo "Checking for image: ${IMAGE}"
          # Try to pull the manifest (without downloading the image)
          if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Image already exists in registry, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📦 Image not found, will build"
          fi
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

  # Job 1: Build and push multi-arch Nix image to GHCR
  build-and-push-image:
    name: Build and Push Test Image
    needs: check-image
    if: needs.check-image.outputs.image-exists != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            platform: linux/amd64
          - arch: aarch64-linux
            platform: linux/arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            max-jobs = auto
            cores = 0
            extra-platforms = aarch64-linux

      - name: Setup magic-nix-cache for ultra-fast builds
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Setup Cachix for Nix packages
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Cache Nix store paths
        uses: actions/cache@v4
        with:
          path: |
            /nix/store
            ~/.cache/nix
          key: ${{ runner.os }}-${{ matrix.arch }}-nix-${{ hashFiles('tests/nix/flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-nix-

      - name: Build test-runner image with Nix for ${{ matrix.arch }}
        run: |
          cd tests/nix
          # Build for specific architecture using Nix cross-compilation
          nix build .#packages.${{ matrix.arch }}.dockerImage --out-link result --print-build-logs
          echo "Image built successfully for ${{ matrix.arch }}"

      - name: Log in to Container Registry
        # ghcr.io occasionally times out on the auth handshake under
        # GHA load (Client.Timeout exceeded while awaiting headers).
        # docker/login-action runs once; wrap docker login in
        # nick-fields/retry so a transient handshake failure does not
        # take out the whole BDD job.
        uses: nick-fields/retry@v3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "$GHCR_TOKEN" | docker login ${{ env.REGISTRY }} -u "$GHCR_ACTOR" --password-stdin

      - name: Load and push arch-specific image
        run: |
          docker load < tests/nix/result
          ARCH_TAG="${{ needs.check-image.outputs.image-tag }}-${{ matrix.arch }}"
          docker tag pg_doorman-test-env:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${ARCH_TAG}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${ARCH_TAG}
          echo "Pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${ARCH_TAG}"

  # Job 2: Create multi-arch manifest
  create-manifest:
    name: Create Multi-Arch Manifest
    needs: [ check-image, build-and-push-image ]
    if: needs.check-image.outputs.image-exists != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to Container Registry
        # ghcr.io occasionally times out on the auth handshake under
        # GHA load (Client.Timeout exceeded while awaiting headers).
        # docker/login-action runs once; wrap docker login in
        # nick-fields/retry so a transient handshake failure does not
        # take out the whole BDD job.
        uses: nick-fields/retry@v3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "$GHCR_TOKEN" | docker login ${{ env.REGISTRY }} -u "$GHCR_ACTOR" --password-stdin

      - name: Create and push multi-arch manifest
        # Only the hash-tagged manifest is published. The image is
        # addressed exclusively by the flake hash everywhere it is
        # consumed (prepare-tests passes the tag through to bdd-tests
        # via outputs.image-tag), so a `:latest` floating tag would
        # exist only as a footgun: any out-of-band `docker pull
        # ghcr.io/.../test-runner` would land on an arbitrary version
        # without warning. Pinning to the hash is the contract.
        run: |
          IMAGE_TAG="${{ needs.check-image.outputs.image-tag }}"
          BASE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker manifest create ${BASE_IMAGE}:${IMAGE_TAG} \
            ${BASE_IMAGE}:${IMAGE_TAG}-x86_64-linux \
            ${BASE_IMAGE}:${IMAGE_TAG}-aarch64-linux
          docker manifest annotate ${BASE_IMAGE}:${IMAGE_TAG} \
            ${BASE_IMAGE}:${IMAGE_TAG}-x86_64-linux --os linux --arch amd64
          docker manifest annotate ${BASE_IMAGE}:${IMAGE_TAG} \
            ${BASE_IMAGE}:${IMAGE_TAG}-aarch64-linux --os linux --arch arm64
          docker manifest push ${BASE_IMAGE}:${IMAGE_TAG}
          echo "✅ Multi-arch manifest created and pushed"
          echo "Image: ${BASE_IMAGE}:${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "Architectures: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY

  # Job 3: Prepare image tag for test jobs (waits for build if needed, or proceeds if image exists)
  prepare-tests:
    name: Prepare Test Image
    needs: [ check-image, create-manifest ]
    # Run when check-image succeeded AND either:
    #   - image already exists in registry (create-manifest was skipped), OR
    #   - image was just built (create-manifest succeeded)
    if: >-
      always() &&
      needs.check-image.result == 'success' &&
      (needs.check-image.outputs.image-exists == 'true' || needs.create-manifest.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ needs.check-image.outputs.image-tag }}
    steps:
      - name: Output image tag for tests
        run: |
          if [ "${{ needs.check-image.outputs.image-exists }}" == "true" ]; then
            echo "✅ Using cached image: ${{ needs.check-image.outputs.image-tag }}"
          else
            echo "✅ Using freshly built image: ${{ needs.check-image.outputs.image-tag }}"
          fi

  # Compile the BDD test binaries once and stash cargo's registry +
  # target dir in GHA cache so the 23-way matrix below does not pay a
  # full `cargo download + compile` per suite. Default features cover
  # all suites except `tls-migration`, which builds in its own target
  # subdirectory because of the cargo features-hash. `CARGO_HOME` is
  # pinned inside `/workspace/.cargo` so the cache stays under
  # `github.workspace` and no host UID/permission tricks are needed.
  prebuild-bdd:
    name: Prebuild BDD test binaries
    needs: prepare-tests
    if: always() && needs.prepare-tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            .cargo
            target
          key: ${{ runner.os }}-bdd-cargo-${{ needs.prepare-tests.outputs.image-tag }}-${{ hashFiles('Cargo.lock', 'src/**', 'tests/**', 'build.rs') }}
          restore-keys: |
            ${{ runner.os }}-bdd-cargo-${{ needs.prepare-tests.outputs.image-tag }}-
            ${{ runner.os }}-bdd-cargo-

      - name: Log in to Container Registry
        # ghcr.io occasionally times out on the auth handshake under
        # GHA load (Client.Timeout exceeded while awaiting headers).
        # docker/login-action runs once; wrap docker login in
        # nick-fields/retry so a transient handshake failure does not
        # take out the whole BDD job.
        uses: nick-fields/retry@v3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "$GHCR_TOKEN" | docker login ${{ env.REGISTRY }} -u "$GHCR_ACTOR" --password-stdin

      - name: Pull test image from GHCR
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tests.outputs.image-tag }}

      - name: Compile bdd + patroni_proxy_bdd binaries (default features)
        run: |
          docker run --rm \
            --network=host \
            -e CARGO_NET_RETRY=10 \
            -e CARGO_HTTP_TIMEOUT=60 \
            -e CARGO_HOME=/workspace/.cargo \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tests.outputs.image-tag }} \
            sh -c "cargo test --test bdd --no-run && cargo test --test patroni_proxy_bdd --no-run"

      - name: Compile bdd binary (tls-migration feature)
        run: |
          docker run --rm \
            --network=host \
            -e CARGO_NET_RETRY=10 \
            -e CARGO_HTTP_TIMEOUT=60 \
            -e CARGO_HOME=/workspace/.cargo \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tests.outputs.image-tag }} \
            cargo test --features tls-migration --test bdd --no-run

      - name: Chown cargo cache so actions/cache can read it
        # The docker steps above ran as root, so `.cargo/` and `target/`
        # are root-owned on the host. actions/cache@v4 saves files as
        # the runner user (uid 1001); without this chown its post-step
        # tar gets permission-denied on every file and silently writes
        # an empty cache (~13s save, ~0s restore on the next run).
        # `sudo` is available on GitHub-hosted ubuntu-latest by default.
        run: |
          sudo chown -R "$(id -u):$(id -g)" .cargo target
          du -sh .cargo target

  # Single matrixed job replaces the 21 nearly-identical per-language /
  # per-suite jobs that used to live here. Each suite differs only in
  # the cargo command it runs; share everything else. See the cargo
  # step below for the retry policy and why three attempts beat two
  # on the dominant GHA flake families (DNS to crates.io, timing-
  # sensitive lifecycle scenarios).
  bdd-tests:
    name: 'BDD: ${{ matrix.suite.name }}'
    needs: [ prepare-tests, prebuild-bdd ]
    if: always() && needs.prepare-tests.result == 'success' && needs.prebuild-bdd.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      # Six concurrent suites is the cap this matrix was tuned for.
      # GitHub-hosted runners share CPU under heavy fan-out; with 20+
      # BDD jobs in parallel, the sleep-based lifecycle tests and the
      # SCRAM passthrough reconnect tests lost timing margin. This cap
      # keeps those suites stable while reducing total wall time versus
      # the previous limit of four.
      max-parallel: 6
      matrix:
        suite:
          - { name: "Go",                                cargo: "test --test bdd -- --tags @go" }
          - { name: "Python",                            cargo: "test --test bdd -- --tags @python" }
          - { name: "Node.js",                           cargo: "test --test bdd -- --tags @nodejs" }
          - { name: ".NET",                              cargo: "test --test bdd -- --tags @dotnet" }
          - { name: "Java",                              cargo: "test --test bdd -- --tags @java" }
          - { name: "PHP",                               cargo: "test --test bdd -- --tags @php" }
          - { name: "Rust part 1",                       cargo: "test --test bdd -- --tags @rust-1" }
          - { name: "Rust part 2",                       cargo: "test --test bdd -- --tags @rust-2" }
          - { name: "Rust part 3",                       cargo: "test --test bdd -- --tags @rust-3" }
          - { name: "Rust part 4 (sleep-heavy lifecycle)", cargo: "test --test bdd -- --tags @rust-4" }
          - { name: "Binary upgrade graceful shutdown",  cargo: "test --test bdd -- --tags @binary-upgrade-grac-shutdown" }
          - { name: "Fuzz",                              cargo: "test --test bdd -- --tags @fuzz" }
          - { name: "Generate",                          cargo: "test --test bdd -- --tags @generate" }
          - { name: "Patroni proxy",                     cargo: "test --test patroni_proxy_bdd" }
          - { name: "Rollback",                          cargo: "test --test bdd -- --tags @rollback" }
          - { name: "Auth query",                        cargo: "test --test bdd -- --tags @auth-query" }
          - { name: "Static passthrough",                cargo: "test --test bdd -- --tags @static-passthrough" }
          - { name: "Client migration (plain TCP)",      cargo: 'test --test bdd -- --tags "@client-migration and not @tls-migration"' }
          - { name: "Patroni-assisted fallback",         cargo: "test --test bdd -- --tags @patroni_fallback" }
          - { name: "Server TLS",                        cargo: "test --test bdd -- --tags @server-tls" }
          - { name: "TLS migration (vendored OpenSSL)",  cargo: "test --features tls-migration --test bdd -- --tags @tls-migration" }
          - { name: "Startup parameters",                cargo: "test --test bdd -- --tags @startup-parameters" }
          - { name: "Web UI",                            cargo: "test --test bdd -- --tags @web-ui" }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore cargo cache from prebuild
        # Same key shape as prebuild-bdd. Restore-keys fall back to any
        # earlier prebuild for this image tag, then to any prebuild on
        # this OS, so a matrix entry never starts from a cold cargo.
        uses: actions/cache@v4
        with:
          path: |
            .cargo
            target
          key: ${{ runner.os }}-bdd-cargo-${{ needs.prepare-tests.outputs.image-tag }}-${{ hashFiles('Cargo.lock', 'src/**', 'tests/**', 'build.rs') }}
          restore-keys: |
            ${{ runner.os }}-bdd-cargo-${{ needs.prepare-tests.outputs.image-tag }}-
            ${{ runner.os }}-bdd-cargo-

      - name: Log in to Container Registry
        # Even when test-runner is currently a public package, the BDD
        # jobs depend on `docker pull` succeeding. Without explicit
        # login they would silently break if the package visibility
        # ever flips to private. Wrapped in nick-fields/retry because
        # ghcr.io's auth endpoint occasionally times out under GHA
        # load (Client.Timeout exceeded while awaiting headers) and the
        # base docker/login-action does not retry on its own.
        uses: nick-fields/retry@v3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            echo "$GHCR_TOKEN" | docker login ${{ env.REGISTRY }} -u "$GHCR_ACTOR" --password-stdin

      - name: Pull test image from GHCR
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tests.outputs.image-tag }}

      - name: Run BDD suite (${{ matrix.suite.name }})
        # `--network=host` is the load-bearing flag. With the default
        # bridge network, the container inherits DNS from the docker
        # daemon, which on a GitHub-hosted runner does not always
        # re-export the host's systemd-resolved stub at 127.0.0.53.
        # When the bridge resolver is wedged for a job, every cargo
        # attempt inside the container fails with
        # `Could not resolve host: index.crates.io` and stays wedged
        # for minutes — both cargo's own retries and an outer step
        # retry hit the same dead resolver. Outer retries do not
        # rescue that case (we tried 3×30 s in a previous commit and
        # the job still drained all three attempts on the wedged
        # resolver). Sharing the host's network stack short-circuits
        # the bridge resolver entirely; this is safe because each
        # matrix entry runs on its own ephemeral runner, so no two
        # BDD suites contend for the same loopback ports.
        #
        # `CARGO_NET_RETRY=10` (default 2) and `CARGO_HTTP_TIMEOUT=60`
        # (default 30 s) widen cargo's internal network retry loop for
        # the residual case where the host's own resolver works but
        # `index.crates.io` itself rate-limits or 5xx's mid-fetch.
        #
        # The outer 2-attempt retry remains for the timing-sensitive
        # BDD flake family (SCRAM passthrough reconnect after retain,
        # sleep-based lifecycle waits) that occasionally loses its
        # margin under cross-job contention. It is not a network
        # safety net — that responsibility moved to `--network=host`
        # plus the cargo env vars above.
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          retry_wait_seconds: 5
          command: |
            docker run --rm \
              --network=host \
              -e CARGO_NET_RETRY=10 \
              -e CARGO_HTTP_TIMEOUT=60 \
              -e CARGO_HOME=/workspace/.cargo \
              -v ${{ github.workspace }}:/workspace \
              -w /workspace \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare-tests.outputs.image-tag }} \
              cargo ${{ matrix.suite.cargo }}
