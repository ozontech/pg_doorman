<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Bloomberg-style operator console mark: black square, amber tickertape
       underline, paper-white tabular monogram. Square corners and one
       hairline underline keep it readable at 16x16, 32x32, and 64x64
       while signalling the same aesthetic as the dashboard itself. -->
  <rect width="32" height="32" fill="#000000"/>
  <rect x="0" y="29" width="32" height="2" fill="#ffb000"/>
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-size="18"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#e8e3d6"
  >pd</text>
</svg>
